<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szavazás</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:16px;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:1rem 1rem 3rem}
.card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin-bottom:12px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
.btn{display:inline-block;padding:12px 20px;border-radius:8px;border:none;font-size:15px;font-weight:500;cursor:pointer;text-align:center;margin-bottom:8px;width:100%}
.btn-primary{background:#1a56db;color:#fff}.btn-primary:hover{background:#1e429f}
.btn-success{background:#057a55;color:#fff}.btn-success:hover{background:#046c4e}
.btn-danger{background:#c81e1e;color:#fff}.btn-danger:hover{background:#9b1c1c}
.btn-outline{background:#fff;color:#1a1a1a;border:1.5px solid #d1d5db}.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:6px 12px;font-size:13px;width:auto;margin:0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.b-inactive{background:#f3f4f6;color:#6b7280}
.b-active{background:#d1fae5;color:#065f46}
.b-closed{background:#fee2e2;color:#991b1b}
.b-winner{background:#dbeafe;color:#1e40af}
input[type=text],select,textarea{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:8px}
input[type=text]:focus,select:focus,textarea:focus{outline:none;border-color:#1a56db}
textarea{height:120px;resize:vertical}
.cand-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.cand-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;transition:all .15s}
.cand-item:hover{border-color:#1a56db;background:#eff6ff}
.cand-item.checked{border-color:#1a56db;background:#eff6ff}
.cand-item.disabled{opacity:.35;pointer-events:none}
.cand-item input[type=checkbox]{width:16px;height:16px;accent-color:#1a56db;flex-shrink:0}
.counter{font-size:15px;font-weight:500;color:#6b7280;margin-bottom:12px;padding:10px 14px;background:#f9fafb;border-radius:8px}
.counter span{color:#1a56db;font-size:22px;font-weight:700}
.name-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.name-btn{padding:14px 18px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;cursor:pointer;background:#fff;text-align:left;transition:all .15s}
.name-btn:hover{border-color:#1a56db;background:#eff6ff}
.name-btn.used{opacity:.35;pointer-events:none;background:#f9fafb}
.confirm-box{background:#eff6ff;border:1.5px solid #1a56db;border-radius:10px;padding:1.5rem;margin-bottom:1rem;text-align:center}
.confirm-name{font-size:24px;font-weight:700;color:#1e40af;margin:8px 0}
.voter-header{background:#1a56db;color:#fff;padding:10px 16px;border-radius:8px;margin-bottom:1rem;font-size:13px}
.radio-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:15px;background:#fff;transition:all .15s}
.radio-opt:hover{border-color:#1a56db;background:#eff6ff}
.radio-opt.disabled{opacity:.35;pointer-events:none}
.radio-opt input{accent-color:#1a56db;width:18px;height:18px;flex-shrink:0}
.result-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.result-name{width:160px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;background:#f3f4f6;border-radius:4px;height:20px;overflow:hidden}
.bar{height:100%;background:#1a56db;border-radius:4px;transition:width .5s}
.bar.winner-bar{background:#057a55}
.result-cnt{font-size:14px;font-weight:600;width:32px;text-align:right;color:#6b7280}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.metric{background:#f9fafb;border-radius:8px;padding:12px}
.metric-label{font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:700}
.ctrl-row{display:flex;align-items:center;gap:8px;padding:12px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:8px;flex-wrap:wrap}
.ctrl-name{font-size:14px;font-weight:500;flex:1;min-width:120px}
.tab-bar{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:1.5rem;overflow-x:auto;gap:0}
.tab{padding:10px 14px;font-size:14px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:500}
.info{background:#f9fafb;border-radius:8px;padding:12px 14px;font-size:14px;color:#6b7280;margin-bottom:12px;line-height:1.6}
.winner-box{background:#d1fae5;border:1.5px solid #057a55;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:14px;color:#065f46}
.error-box{background:#fee2e2;border:1.5px solid #c81e1e;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:14px;color:#991b1b}
.chip{display:inline-flex;align-items:center;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 10px;font-size:12px;margin:2px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:#1a56db}
.chip.selected{background:#eff6ff;border-color:#1a56db;color:#1e40af}
.chip.used{opacity:.3;pointer-events:none;text-decoration:line-through}
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;margin-bottom:12px}
.upload-zone:hover{border-color:#1a56db;background:#f0f7ff}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:#9ca3af;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.office-setup{border:1px solid #e5e7eb;border-radius:10px;padding:1rem;margin-bottom:1rem}
.office-setup-title{font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:#6b7280}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.success-screen{text-align:center;padding:2rem 1rem}
.success-icon{font-size:56px;margin-bottom:1rem}
.device-id-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;font-size:13px;color:#6b7280;margin-top:1rem;font-family:monospace;word-break:break-all}
.qr-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:1rem;text-align:center;margin-bottom:1rem}
.qr-box canvas{margin:0 auto;display:block}
.qr-label{font-size:12px;color:#9ca3af;margin-top:8px;word-break:break-all}
.log-table{width:100%;border-collapse:collapse;font-size:13px}
.log-table th{text-align:left;padding:8px 10px;border-bottom:2px solid #e5e7eb;color:#6b7280;font-weight:500}
.log-table td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.log-table tr:hover td{background:#f9fafb}
.votes-list{font-size:11px;color:#6b7280;max-width:200px}
hr{border:none;border-top:1px solid #e5e7eb;margin:1.5rem 0}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"><div class="loading"><div class="spinner"></div><span>Betöltés...</span></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcrATH0W2VVbLI2lfVvoT2V9CmhgvOQn4",
  authDomain: "szavazas-dd648.firebaseapp.com",
  databaseURL: "https://szavazas-dd648-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "szavazas-dd648",
  storageBucket: "szavazas-dd648.firebasestorage.app",
  messagingSenderId: "320150428563",
  appId: "1:320150428563:web:7332b408496db091ec6666"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Routing ──
const params = new URLSearchParams(window.location.search);
const mode = params.get('mode') || 'voter1';
const isAdmin = mode === 'admin';
const isProjector = mode === 'kivetito';
const isRound2 = mode === '2kor';

// ── Eszköz azonosító ──
function getDeviceId() {
  let id = localStorage.getItem('szavazas_device_id');
  if (!id) {
    id = 'eszkoz-' + Math.random().toString(36).substr(2,6) + '-' + Date.now().toString(36).substr(-4);
    localStorage.setItem('szavazas_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

// ── Helyi állapot ──
let localVotes1 = {};
let localVoterName = null;
let confirmingName = false;
let votedOffices = new Set();

// ── Firebase ──
let dbState = {};
onValue(ref(db, 'state'), snap => {
  dbState = snap.val() || {};
  render();
});

function render() {
  if (isAdmin) renderAdmin();
  else if (isProjector) renderProjector();
  else if (isRound2) renderRound2();
  else renderVoter1();
}

// ══════════════════════════════════════
// ADMIN
// ══════════════════════════════════════
function renderAdmin() {
  const s = dbState;
  const tab = window._adminTab || 'setup';
  const baseUrl = window.location.href.split('?')[0];

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>${s.settings?.title || 'Szavazás'}</h1>
      <div class="sub">${s.settings?.subtitle || 'Adminisztrációs felület'}</div>
      <div class="tab-bar">
        <button class="tab ${tab==='setup'?'active':''}" onclick="setTab('setup')">Beállítás</button>
        <button class="tab ${tab==='control'?'active':''}" onclick="setTab('control')">Vezérlés</button>
        <button class="tab ${tab==='results'?'active':''}" onclick="setTab('results')">Eredmények</button>
        <button class="tab ${tab==='log'?'active':''}" onclick="setTab('log')">Napló</button>
        <button class="tab ${tab==='qr'?'active':''}" onclick="setTab('qr')">QR kódok</button>
      </div>
      <div id="tab-content">${renderAdminTab(tab, s, baseUrl)}</div>
    </div>`;

  if (tab === 'qr') setTimeout(() => generateQRCodes(baseUrl), 100);
}

function renderAdminTab(tab, s, baseUrl) {
  if (tab === 'setup') return renderSetup(s);
  if (tab === 'control') return renderControl(s);
  if (tab === 'results') return renderResults(s);
  if (tab === 'log') return renderLog(s);
  if (tab === 'qr') return renderQR();
  return '';
}

function renderSetup(s) {
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  const winners = s.vote1?.winners || [];
  const usedAsWinner = new Set(Object.values(s.vote2?.officeWinners || {}));

  let officeSetup = '';
  if (winners.length) {
    offices.forEach(office => {
      const nominees = s.vote2?.nominees?.[office] || [];
      const isLocked = ['active','closed'].includes(s.vote2?.status?.[office]);
      officeSetup += `<div class="office-setup">
        <div class="office-setup-title">
          <span>${office}</span>
          ${s.vote2?.officeWinners?.[office] ? `<span class="badge b-winner">✓ ${s.vote2.officeWinners[office]}</span>` : ''}
        </div>
        ${isLocked
          ? `<div class="info">Szavazás folyamatban — jelöltek: ${nominees.join(', ')}</div>`
          : `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
              ${winners.map(name => {
                const isWon = usedAsWinner.has(name) && !nominees.includes(name);
                const isSel = nominees.includes(name);
                return `<span class="chip${isSel?' selected':''}${isWon?' used':''}" onclick="toggleNominee('${office}','${esc(name)}')">${name}${isSel?' ✓':''}</span>`;
              }).join('')}
            </div>
            <div style="font-size:12px;color:#6b7280">Kijelölve: ${nominees.length} fő (max 4)</div>`
        }
      </div>`;
    });
  }

  return `
    <h2>Általános beállítások</h2>
    <input type="text" id="set-title" placeholder="Szavazás neve" value="${s.settings?.title||''}">
    <input type="text" id="set-subtitle" placeholder="Alcím / szervezet neve" value="${s.settings?.subtitle||''}">
    <div style="font-size:13px;font-weight:500;margin-bottom:6px;color:#6b7280">Tisztségek (soronként egy)</div>
    <textarea id="set-offices">${offices.join('\n')}</textarea>
    <button class="btn btn-outline" onclick="saveSettings()" style="width:auto">Beállítások mentése</button>
    <hr>
    <h2>1. kör — jelöltek (max 45 fő)</h2>
    <div class="upload-zone" onclick="document.getElementById('file-inp').click()">
      <input type="file" id="file-inp" accept=".xlsx,.xls,.csv,.txt" onchange="handleFile(this)" style="display:none">
      <div style="font-size:28px;margin-bottom:6px">📂</div>
      <div style="font-weight:500">Fájl betöltése</div>
      <div style="font-size:13px;color:#9ca3af">Excel (.xlsx), CSV vagy TXT</div>
    </div>
    <div class="divider">vagy</div>
    <textarea id="names-input" placeholder="Soronként egy név...">${(s.vote1?.candidates||[]).join('\n')}</textarea>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-outline" onclick="loadDemo()" style="width:auto">Demo nevek</button>
      <button class="btn btn-primary" onclick="saveCandidates()" style="width:auto">Mentés</button>
    </div>
    <div id="cand-preview" style="font-size:13px;color:#6b7280;margin-bottom:1rem">${s.vote1?.candidates?.length ? s.vote1.candidates.length+' jelölt elmentve' : ''}</div>
    ${winners.length ? `<hr><h2>2. kör — tisztségjelöltek</h2><div class="info">Kattints a nevekre a jelöltek kijelöléséhez.</div>${officeSetup}` : ''}`;
}

function renderControl(s) {
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  const v1s = s.vote1?.status || 'inactive';
  const votes = s.vote1?.voterCount || 0;

  return `
    <h2>Szavazások vezérlése</h2>
    <div class="ctrl-row">
      <span class="ctrl-name">1. kör — tagválasztás</span>
      <span class="badge ${v1s==='active'?'b-active':v1s==='closed'?'b-closed':'b-inactive'}">${v1s==='active'?'Aktív':v1s==='closed'?'Lezárva':'Inaktív'}</span>
      <span style="font-size:13px;color:#6b7280">${votes} szavazat</span>
      <button class="btn btn-success btn-sm" onclick="startVote1()">Indítás</button>
      <button class="btn btn-outline btn-sm" onclick="resetVote1()">Reset</button>
      <button class="btn btn-danger btn-sm" onclick="closeVote1()">Lezárás</button>
    </div>
    ${offices.map(office => {
      const st = s.vote2?.status?.[office] || 'inactive';
      const vc = s.vote2?.voterCount?.[office] || 0;
      return `<div class="ctrl-row">
        <span class="ctrl-name">2. kör — ${office}</span>
        <span class="badge ${st==='active'?'b-active':st==='closed'?'b-closed':'b-inactive'}">${st==='active'?'Aktív':st==='closed'?'Lezárva':'Inaktív'}</span>
        <span style="font-size:13px;color:#6b7280">${vc} szavazat</span>
        <button class="btn btn-success btn-sm" onclick="startOffice('${office}')">Indítás</button>
        <button class="btn btn-outline btn-sm" onclick="resetOffice('${office}')">Reset</button>
        <button class="btn btn-danger btn-sm" onclick="closeOffice('${office}')">Lezárás</button>
      </div>`;
    }).join('')}`;
}

function renderResults(s) {
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  let html = '';

  if (s.vote1?.results) {
    const sorted = Object.entries(s.vote1.results).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const winnerSet = new Set(s.vote1.winners||[]);
    html += `<h2 style="margin-bottom:12px">1. kör eredménye</h2>`;
    if (winnerSet.size) html += `<div class="winner-box">Nyertesek (11 fő): ${[...winnerSet].join(', ')}</div>`;
    sorted.slice(0,20).forEach(([name,count]) => {
      const pct = Math.round(count/max*100);
      const isW = winnerSet.has(name);
      html += `<div class="result-row">
        <div class="result-name">${isW?'✓ ':''}<b style="font-weight:${isW?'600':'400'}">${name}</b></div>
        <div class="bar-wrap"><div class="bar${isW?' winner-bar':''}" style="width:${pct}%"></div></div>
        <div class="result-cnt">${count}</div>
      </div>`;
    });
    html += '<hr>';
  }

  offices.forEach(office => {
    const res = s.vote2?.results?.[office];
    if (!res) return;
    const sorted = Object.entries(res).sort((a,b)=>b[1]-a[1]);
    const max2 = Math.max(...sorted.map(e=>e[1]),1);
    const winner = s.vote2?.officeWinners?.[office];
    html += `<h2 style="margin-bottom:12px">${office}</h2>`;
    if (winner) html += `<div class="winner-box">Megválasztva: <b>${winner}</b></div>`;
    sorted.forEach(([name,count]) => {
      const pct = Math.round(count/max2*100);
      const isW = winner===name;
      html += `<div class="result-row">
        <div class="result-name">${isW?'✓ ':''}<b style="font-weight:${isW?'600':'400'}">${name}</b></div>
        <div class="bar-wrap"><div class="bar${isW?' winner-bar':''}" style="width:${pct}%"></div></div>
        <div class="result-cnt">${count}</div>
      </div>`;
    });
    html += '<hr>';
  });

  return html || '<div class="info">Még nincsenek eredmények.</div>';
}

function renderLog(s) {
  const log = s.vote1?.log || {};
  const entries = Object.entries(log).sort((a,b) => (b[1].ts||0)-(a[1].ts||0));

  if (!entries.length) return '<div class="info">Még nincs szavazói napló.</div>';

  return `
    <h2 style="margin-bottom:12px">Szavazói napló — 1. kör</h2>
    <div style="overflow-x:auto">
    <table class="log-table">
      <thead><tr>
        <th>Eszköz ID</th>
        <th>Időpont</th>
        <th>Szavazatok</th>
        <th></th>
      </tr></thead>
      <tbody>
        ${entries.map(([deviceId, entry]) => `
          <tr>
            <td style="font-family:monospace;font-size:12px">${deviceId}</td>
            <td style="white-space:nowrap">${entry.ts ? new Date(entry.ts).toLocaleTimeString('hu') : '-'}</td>
            <td><div class="votes-list">${(entry.votes||[]).join(', ')}</div></td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteVote('${deviceId}')">Töröl</button></td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

function renderQR() {
  return `
    <h2 style="margin-bottom:12px">QR kódok</h2>
    <div class="qr-box"><div id="qr1"></div><div class="qr-label" id="qr1-label"></div></div>
    <div class="qr-box"><div id="qr2"></div><div class="qr-label" id="qr2-label"></div></div>
    <div class="qr-box"><div id="qr3"></div><div class="qr-label" id="qr3-label"></div></div>`;
}

function generateQRCodes(baseUrl) {
  const links = [
    { id: 'qr1', label: '1. kör szavazók', url: baseUrl },
    { id: 'qr2', label: '2. kör (11 nyertes)', url: baseUrl + '?mode=2kor' },
    { id: 'qr3', label: 'Kivetítő', url: baseUrl + '?mode=kivetito' },
  ];
  links.forEach(({id, label, url}) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    new QRCode(el, { text: url, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
    document.getElementById(id+'-label').textContent = label + ': ' + url;
  });
}

// ══════════════════════════════════════
// 1. KÖR SZAVAZÓ
// ══════════════════════════════════════
function renderVoter1() {
  const s = dbState;
  const status = s.vote1?.status || 'inactive';
  const candidates = s.vote1?.candidates || [];
  const alreadyVoted = s.vote1?.log?.[DEVICE_ID];
  const title = s.settings?.title || 'Szavazás';
  const subtitle = s.settings?.subtitle || '';

  let content = '';

  if (alreadyVoted) {
    content = `<div class="success-screen">
      <div class="success-icon">✅</div>
      <h2>Már szavaztál!</h2>
      <p style="color:#6b7280;margin-top:8px">Szavazatod sikeresen rögzítve.</p>
      <div class="device-id-box">Eszköz azonosítód:<br><b>${DEVICE_ID}</b></div>
    </div>`;
  } else if (status === 'inactive') {
    content = `<div class="info" style="text-align:center;padding:2rem">A szavazás még nem kezdődött el.<br>Várd meg az admin jelzését.</div>`;
  } else if (status === 'closed') {
    content = `<div class="info" style="text-align:center;padding:2rem">A szavazás lezárult.</div>`;
  } else {
    const checked = Object.keys(localVotes1).filter(k=>localVotes1[k]);
    content = `
      <div class="counter">Kiválasztva: <span>${checked.length}</span> / 11</div>
      <div class="cand-grid">
        ${candidates.map(c => {
          const isChecked = !!localVotes1[c];
          const isDisabled = !isChecked && checked.length >= 11;
          return `<label class="cand-item${isChecked?' checked':''}${isDisabled?' disabled':''}">
            <input type="checkbox" ${isChecked?'checked':''} ${isDisabled?'disabled':''} onchange="toggleV1('${esc(c)}',this.checked)">
            ${c}
          </label>`;
        }).join('')}
      </div>
      <button class="btn btn-primary" onclick="submitV1()">Szavazat leadása</button>
      <div class="device-id-box" style="margin-top:1rem">Eszköz azonosítód: <b>${DEVICE_ID}</b></div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="card"><h1>${title}</h1><div class="sub">${subtitle}</div>${content}</div>`;
}

// ══════════════════════════════════════
// 2. KÖR SZAVAZÓ
// ══════════════════════════════════════
function renderRound2() {
  const s = dbState;
  const title = s.settings?.title || 'Szavazás';
  const winners = s.vote1?.winners || [];
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];

  if (!winners.length) {
    document.getElementById('app').innerHTML = `<div class="card"><h1>${title}</h1>
      <div class="info" style="text-align:center;padding:2rem">Az 1. kör még nem zárult le.</div></div>`;
    return;
  }

  // Névválasztás
  if (!localVoterName) {
    const loggedIn = s.vote2?.loggedIn || {};
    document.getElementById('app').innerHTML = `<div class="card"><h1>${title}</h1>
      <h2 style="margin-bottom:8px">Ki vagy?</h2>
      <div class="info">Keresd meg a nevedet és kattints rá.</div>
      <div class="name-list">
        ${winners.map(name => {
          const key = name.replace(/ /g,'_');
          const used = !!loggedIn[key];
          return `<button class="name-btn${used?' used':''}" onclick="selectName('${esc(name)}')">
            ${name} ${used?'<span style="font-size:12px;color:#9ca3af">(már szavazott)</span>':''}
          </button>`;
        }).join('')}
      </div></div>`;
    return;
  }

  // Megerősítés
  if (confirmingName) {
    document.getElementById('app').innerHTML = `<div class="card"><h1>${title}</h1>
      <div class="confirm-box">
        <div style="font-size:14px;color:#6b7280">Ezt a nevet választotta:</div>
        <div class="confirm-name">${localVoterName}</div>
        <div style="font-size:14px;color:#6b7280">Ön az?</div>
      </div>
      <button class="btn btn-primary" onclick="confirmName()">Igen, szavazok</button>
      <button class="btn btn-outline" onclick="cancelName()">Mégsem, visszalépek</button>
    </div>`;
    return;
  }

  // Aktív szavazás keresése
  const activeOffice = offices.find(o => s.vote2?.status?.[o] === 'active');

  const header = `<div class="voter-header">👤 <b>${localVoterName}</b> &nbsp;|&nbsp; <span style="font-size:12px;opacity:.8">Eszköz: ${DEVICE_ID}</span></div>`;

  if (!activeOffice) {
    document.getElementById('app').innerHTML = `<div class="card">${header}<h1>${title}</h1>
      <div class="info">Nincs aktív szavazás. Várd meg az admin jelzését.</div></div>`;
    return;
  }

  if (votedOffices.has(activeOffice)) {
    document.getElementById('app').innerHTML = `<div class="card">${header}<h1>${title}</h1>
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h2>${activeOffice} szavazat rögzítve</h2>
        <p style="color:#6b7280;margin-top:8px">Várd meg a következő szavazást.</p>
      </div></div>`;
    return;
  }

  const nominees = s.vote2?.nominees?.[activeOffice] || [];
  const alreadyWon = new Set(Object.values(s.vote2?.officeWinners || {}));

  document.getElementById('app').innerHTML = `<div class="card">${header}
    <h1>${title}</h1>
    <h2 style="margin-bottom:8px">${activeOffice} választás</h2>
    <div class="info">Válaszd ki a ${activeOffice.toLowerCase()}t.</div>
    ${nominees.map(name => {
      const isWon = alreadyWon.has(name);
      return `<label class="radio-opt${isWon?' disabled':''}">
        <input type="radio" name="pick" value="${name}" ${isWon?'disabled':''}>
        ${name} ${isWon?'<span class="badge b-closed" style="margin-left:4px">Már megválasztva</span>':''}
      </label>`;
    }).join('')}
    <button class="btn btn-primary" style="margin-top:12px" onclick="submitOffice('${activeOffice}')">Szavazat leadása</button>
  </div>`;
}

// ══════════════════════════════════════
// KIVETÍTŐ
// ══════════════════════════════════════
function renderProjector() {
  const s = dbState;
  const title = s.settings?.title || 'Szavazás';
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  const v1s = s.vote1?.status || 'inactive';
  const activeOffice = offices.find(o => s.vote2?.status?.[o] === 'active');
  const lastClosed = [...offices].reverse().find(o => s.vote2?.status?.[o] === 'closed');

  let content = '';

  if (activeOffice) {
    const res = s.vote2?.results?.[activeOffice] || {};
    const sorted = Object.entries(res).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const total = sorted.reduce((a,b)=>a+b[1],0);
    content = `<div style="font-size:20px;color:#6b7280;margin-bottom:6px">${activeOffice} szavazás</div>
      <div style="font-size:14px;color:#9ca3af;margin-bottom:2rem">Szavazatok: ${total}</div>
      ${sorted.map(([name,count]) => `
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:24px;font-weight:600">${name}</span>
            <span style="font-size:24px;font-weight:700;color:#1a56db">${count}</span>
          </div>
          <div style="background:#e5e7eb;border-radius:6px;height:32px;overflow:hidden">
            <div style="height:100%;background:#1a56db;border-radius:6px;width:${Math.round(count/max*100)}%;transition:width .5s"></div>
          </div>
        </div>`).join('')}`;
  } else if (lastClosed) {
    const res = s.vote2?.results?.[lastClosed] || {};
    const sorted = Object.entries(res).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const winner = s.vote2?.officeWinners?.[lastClosed];
    content = `<div style="font-size:20px;color:#6b7280;margin-bottom:6px">${lastClosed} — Eredmény</div>
      ${winner?`<div style="font-size:36px;font-weight:700;color:#057a55;margin-bottom:1.5rem">✓ Megválasztva: ${winner}</div>`:''}
      ${sorted.map(([name,count]) => {
        const isW = winner===name;
        return `<div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:22px;font-weight:${isW?'700':'400'};color:${isW?'#057a55':'inherit'}">${isW?'✓ ':''}${name}</span>
            <span style="font-size:22px;font-weight:700;color:${isW?'#057a55':'#1a56db'}">${count}</span>
          </div>
          <div style="background:#e5e7eb;border-radius:4px;height:24px;overflow:hidden">
            <div style="height:100%;background:${isW?'#057a55':'#1a56db'};border-radius:4px;width:${Math.round(count/max*100)}%;transition:width .5s"></div>
          </div>
        </div>`;
      }).join('')}`;
  } else if (v1s !== 'inactive') {
    const sorted = Object.entries(s.vote1?.results||{}).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const winnerSet = new Set(s.vote1?.winners||[]);
    content = `<div style="font-size:20px;color:#6b7280;margin-bottom:6px">1. kör — Tagválasztás</div>
      <div style="font-size:14px;color:#9ca3af;margin-bottom:2rem">Szavazatok: ${s.vote1?.voterCount||0}</div>
      ${sorted.slice(0,15).map(([name,count]) => {
        const isW = winnerSet.has(name) && v1s==='closed';
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:18px;font-weight:${isW?'700':'400'};color:${isW?'#057a55':'inherit'}">${isW?'✓ ':''}${name}</span>
            <span style="font-size:18px;font-weight:600;color:${isW?'#057a55':'#1a56db'}">${count}</span>
          </div>
          <div style="background:#e5e7eb;border-radius:4px;height:20px;overflow:hidden">
            <div style="height:100%;background:${isW?'#057a55':'#1a56db'};border-radius:4px;width:${Math.round(count/max*100)}%;transition:width .5s"></div>
          </div>
        </div>`;
      }).join('')}`;
  } else {
    content = `<div style="text-align:center;padding:4rem;color:#9ca3af;font-size:20px">Várakozás a szavazás kezdetére...</div>`;
  }

  document.getElementById('app').innerHTML = `
    <div style="max-width:900px;margin:0 auto;padding:2rem">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2rem">
        <h1 style="font-size:32px">${title}</h1>
        <span style="font-size:13px;color:#9ca3af">Élő eredmény</span>
      </div>
      ${content}
    </div>`;
}

// ══════════════════════════════════════
// AKCIÓK
// ══════════════════════════════════════
function esc(s){ return s.replace(/'/g,"\\'"); }

window.setTab = t => { window._adminTab = t; renderAdmin(); };

window.saveSettings = async () => {
  const title = document.getElementById('set-title').value.trim();
  const subtitle = document.getElementById('set-subtitle').value.trim();
  const offices = document.getElementById('set-offices').value.split('\n').map(s=>s.trim()).filter(Boolean);
  await update(ref(db,'state/settings'), {title, subtitle, offices});
  alert('Mentve!');
};

window.handleFile = input => {
  const file = input.files[0]; if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  if(ext==='xlsx'||ext==='xls') {
    reader.onload = async e => {
      const XLSX = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
      const wb = XLSX.read(e.target.result,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws,{header:1});
      const names = data.flat().map(v=>String(v).trim()).filter(v=>v&&v.length>1).slice(0,45);
      document.getElementById('names-input').value = names.join('\n');
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => {
      document.getElementById('names-input').value = e.target.result.split(/\r?\n|,|;/).map(s=>s.trim()).filter(Boolean).slice(0,45).join('\n');
    };
    reader.readAsText(file,'UTF-8');
  }
};

window.loadDemo = () => {
  document.getElementById('names-input').value = ['Kovács János','Nagy Péter','Szabó Anna','Tóth Zoltán','Horváth Éva','Varga László','Kiss Mária','Molnár Gábor','Fekete Katalin','Balogh Tibor','Simon Ágnes','Papp Norbert','Takács Judit','Juhász Bence','Lukács Dóra','Farkas Attila','Szőke Réka','Balog Imre','Fodor Szilvia','Oláh Tamás','Sárosi Vera','Kelemen Antal','Nemes Hajnalka','Fekete Róbert','Vincze Kinga','Csizmadia Béla','Halász Tünde','Orbán Csaba','Pálfi Eszter','Rácz Levente','Bíró Margit','Gál Sándor','Hegedűs Ildikó','Magyar Zoltán','Pintér Krisztina','Vásárhelyi Péter','Zsoldos Andrea','Máté István','Virág Zsuzsa','Kardos Dávid','Demeter Nikolett','Fehér Árpád','Bogdán Tímea','Csonka Viktor','Erdős Borbála'].join('\n');
};

window.saveCandidates = async () => {
  const raw = document.getElementById('names-input').value;
  const candidates = raw.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,45);
  const results = {}; candidates.forEach(c => results[c]=0);
  await update(ref(db,'state/vote1'), {candidates, results, status:'inactive', voterCount:0, log:{}});
  document.getElementById('cand-preview').textContent = candidates.length + ' jelölt elmentve';
};

window.startVote1 = async () => {
  if(!dbState.vote1?.candidates?.length){alert('Töltsd be a jelölteket!');return;}
  await update(ref(db,'state/vote1'),{status:'active'});
};

window.resetVote1 = async () => {
  if(!confirm('Reset? Minden szavazat törlődik!')) return;
  const results = {}; (dbState.vote1?.candidates||[]).forEach(c=>results[c]=0);
  await update(ref(db,'state/vote1'),{status:'inactive',results,winners:[],voterCount:0,log:{}});
  localVotes1 = {};
};

window.closeVote1 = async () => {
  const sorted = Object.entries(dbState.vote1?.results||{}).sort((a,b)=>b[1]-a[1]);
  const winners = sorted.slice(0,11).map(e=>e[0]);
  await update(ref(db,'state/vote1'),{status:'closed',winners});
};

window.deleteVote = async deviceId => {
  if(!confirm('Törlöd ezt a szavazatot? A szavazatok visszavonódnak.')) return;
  const entry = dbState.vote1?.log?.[deviceId];
  if(!entry) return;
  const updates = {};
  (entry.votes||[]).forEach(c => {
    const cur = dbState.vote1?.results?.[c]||0;
    if(cur > 0) updates[`state/vote1/results/${c}`] = cur-1;
  });
  const vc = Math.max((dbState.vote1?.voterCount||1)-1, 0);
  updates['state/vote1/voterCount'] = vc;
  updates[`state/vote1/log/${deviceId}`] = null;
  await update(ref(db), updates);
};

window.toggleNominee = async (office, name) => {
  const nominees = [...(dbState.vote2?.nominees?.[office]||[])];
  const idx = nominees.indexOf(name);
  if(idx>=0) nominees.splice(idx,1); else if(nominees.length<4) nominees.push(name);
  await update(ref(db,`state/vote2/nominees`),{[office]:nominees});
};

window.startOffice = async office => {
  const nominees = dbState.vote2?.nominees?.[office]||[];
  if(!nominees.length){alert('Jelöld ki a jelölteket!');return;}
  const results = {}; nominees.forEach(n=>results[n]=0);
  await update(ref(db,`state/vote2/status`),{[office]:'active'});
  await update(ref(db,`state/vote2/results`),{[office]:results});
};

window.resetOffice = async office => {
  if(!confirm(`Reset: ${office}?`)) return;
  const nominees = dbState.vote2?.nominees?.[office]||[];
  const results = {}; nominees.forEach(n=>results[n]=0);
  await update(ref(db,`state/vote2/status`),{[office]:'inactive'});
  await update(ref(db,`state/vote2/results`),{[office]:results});
  await update(ref(db,`state/vote2/officeWinners`),{[office]:null});
  votedOffices.delete(office);
};

window.closeOffice = async office => {
  const res = dbState.vote2?.results?.[office]||{};
  const winner = Object.entries(res).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
  await update(ref(db,`state/vote2/status`),{[office]:'closed'});
  if(winner) await update(ref(db,`state/vote2/officeWinners`),{[office]:winner});
};

window.toggleV1 = (name, checked) => { localVotes1[name]=checked; renderVoter1(); };

window.submitV1 = async () => {
  const picked = Object.keys(localVotes1).filter(k=>localVotes1[k]);
  if(!picked.length){alert('Válassz legalább egy jelöltet!');return;}
  const updates = {};
  picked.forEach(c => { updates[`state/vote1/results/${c}`] = (dbState.vote1?.results?.[c]||0)+1; });
  updates['state/vote1/voterCount'] = (dbState.vote1?.voterCount||0)+1;
  updates[`state/vote1/log/${DEVICE_ID}`] = { ts: Date.now(), votes: picked };
  await update(ref(db), updates);
  localVotes1 = {};
};

window.selectName = name => { localVoterName = name; confirmingName = true; renderRound2(); };
window.confirmName = async () => {
  confirmingName = false;
  await update(ref(db,`state/vote2/loggedIn`),{[localVoterName.replace(/ /g,'_')]:true});
  renderRound2();
};
window.cancelName = () => { localVoterName = null; confirmingName = false; renderRound2(); };

window.submitOffice = async office => {
  const pick = document.querySelector('input[name="pick"]:checked')?.value;
  if(!pick){alert('Válassz egy jelöltet!');return;}
  const cur = dbState.vote2?.results?.[office]?.[pick]||0;
  const vc = (dbState.vote2?.voterCount?.[office]||0)+1;
  await update(ref(db,`state/vote2/results/${office}`),{[pick]:cur+1});
  await update(ref(db,`state/vote2/voterCount`),{[office]:vc});
  votedOffices.add(office);
  renderRound2();
};
</script>
