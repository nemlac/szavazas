<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szavazás</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:16px;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:1rem 1rem 3rem}
.card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin-bottom:12px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
.btn{display:inline-block;padding:12px 20px;border-radius:8px;border:none;font-size:15px;font-weight:500;cursor:pointer;text-align:center;margin-bottom:8px;width:100%}
.btn-primary{background:#1a56db;color:#fff}.btn-primary:hover{background:#1e429f}
.btn-success{background:#057a55;color:#fff}.btn-success:hover{background:#046c4e}
.btn-danger{background:#c81e1e;color:#fff}.btn-danger:hover{background:#9b1c1c}
.btn-warning{background:#d97706;color:#fff}.btn-warning:hover{background:#b45309}
.btn-outline{background:#fff;color:#1a1a1a;border:1.5px solid #d1d5db}.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:6px 12px;font-size:13px;width:auto;margin:0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.b-inactive{background:#f3f4f6;color:#6b7280}
.b-active{background:#d1fae5;color:#065f46}
.b-closed{background:#fee2e2;color:#991b1b}
.b-winner{background:#dbeafe;color:#1e40af}
.b-tie{background:#fef3c7;color:#92400e}
.b-runoff{background:#ede9fe;color:#5b21b6}
input[type=text],textarea{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:8px}
input[type=text]:focus,textarea:focus{outline:none;border-color:#1a56db}
textarea{height:120px;resize:vertical}
.cand-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.cand-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;transition:all .15s}
.cand-item:hover{border-color:#1a56db;background:#eff6ff}
.cand-item.checked{border-color:#1a56db;background:#eff6ff}
.cand-item.disabled{opacity:.35;pointer-events:none}
.cand-item input[type=checkbox]{width:16px;height:16px;accent-color:#1a56db;flex-shrink:0}
.counter{font-size:15px;font-weight:500;color:#6b7280;margin-bottom:12px;padding:10px 14px;background:#f9fafb;border-radius:8px}
.counter span{color:#1a56db;font-size:22px;font-weight:700}
.name-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.name-btn{padding:14px 18px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;cursor:pointer;background:#fff;text-align:left;transition:all .15s}
.name-btn:hover{border-color:#1a56db;background:#eff6ff}
.name-btn.used{opacity:.35;pointer-events:none;background:#f9fafb}
.confirm-box{background:#eff6ff;border:1.5px solid #1a56db;border-radius:10px;padding:1.5rem;margin-bottom:1rem;text-align:center}
.confirm-name{font-size:24px;font-weight:700;color:#1e40af;margin:8px 0}
.voter-header{background:#1a56db;color:#fff;padding:10px 16px;border-radius:8px;margin-bottom:1rem;font-size:13px}
.radio-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:15px;background:#fff;transition:all .15s}
.radio-opt:hover{border-color:#1a56db;background:#eff6ff}
.radio-opt.disabled{opacity:.35;pointer-events:none}
.radio-opt input{accent-color:#1a56db;width:18px;height:18px;flex-shrink:0}
.result-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.result-name{width:160px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;background:#f3f4f6;border-radius:4px;height:20px;overflow:hidden}
.bar{height:100%;background:#1a56db;border-radius:4px;transition:width .5s}
.bar.winner-bar{background:#057a55}
.bar.tie-bar{background:#d97706}
.result-cnt{font-size:14px;font-weight:600;width:32px;text-align:right;color:#6b7280}
.ctrl-row{display:flex;align-items:center;gap:8px;padding:12px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:8px;flex-wrap:wrap}
.ctrl-name{font-size:14px;font-weight:500;flex:1;min-width:120px}
.tab-bar{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:1.5rem;overflow-x:auto;gap:0}
.tab{padding:10px 14px;font-size:14px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:500}
.info{background:#f9fafb;border-radius:8px;padding:12px 14px;font-size:14px;color:#6b7280;margin-bottom:12px;line-height:1.6}
.warn-box{background:#fef3c7;border:1.5px solid #d97706;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.warn-box h3{color:#92400e;font-size:15px;margin-bottom:6px}
.warn-box p{color:#78350f;font-size:13px;margin-bottom:12px}
.winner-box{background:#d1fae5;border:1.5px solid #057a55;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:14px;color:#065f46}
.chip{display:inline-flex;align-items:center;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 10px;font-size:12px;margin:2px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:#1a56db}
.chip.selected{background:#eff6ff;border-color:#1a56db;color:#1e40af}
.chip.used{opacity:.3;pointer-events:none;text-decoration:line-through}
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;margin-bottom:12px}
.upload-zone:hover{border-color:#1a56db;background:#f0f7ff}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:#9ca3af;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.office-setup{border:1px solid #e5e7eb;border-radius:10px;padding:1rem;margin-bottom:1rem}
.office-setup-title{font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:#6b7280}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.success-screen{text-align:center;padding:2rem 1rem}
.success-icon{font-size:56px;margin-bottom:1rem}
.device-id-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;font-size:12px;color:#9ca3af;margin-top:1rem;font-family:monospace;word-break:break-all}
.access-denied{text-align:center;padding:3rem 1rem}
.log-table{width:100%;border-collapse:collapse;font-size:13px}
.log-table th{text-align:left;padding:8px 10px;border-bottom:2px solid #e5e7eb;color:#6b7280;font-weight:500}
.log-table td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.log-table tr:hover td{background:#f9fafb}
.votes-cell{font-size:11px;color:#6b7280;max-width:180px;line-height:1.5}
hr{border:none;border-top:1px solid #e5e7eb;margin:1.5rem 0}
.proj-wrap{max-width:960px;margin:0 auto;padding:2rem}
.proj-qr-row{display:flex;align-items:flex-start;gap:2rem}
.proj-qr-side{display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.proj-qr-item{background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.proj-qr-label{font-size:11px;color:#9ca3af;margin-top:6px}
.proj-results{flex:1}
.proj-waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:2rem}
.proj-qr-big{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="root"><div class="wrap"><div class="card"><div class="loading"><div class="spinner"></div><span>Betöltés...</span></div></div></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyBcrATH0W2VVbLI2lfVvoT2V9CmhgvOQn4",
  authDomain:"szavazas-dd648.firebaseapp.com",
  databaseURL:"https://szavazas-dd648-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"szavazas-dd648",
  storageBucket:"szavazas-dd648.firebasestorage.app",
  messagingSenderId:"320150428563",

const db = getDatabase(app);

const TOKEN_VOTER = 'szv-m7k2p9q4r1x8w3n6';
const TOKEN_ADMIN = 'adm-t5j3h8c1v6b4z9f2';

const P = new URLSearchParams(window.location.search);
const mode = P.get('mode') || 'voter1';
const token = P.get('token') || '';
const isAdmin = mode === 'admin';
const isProjector = mode === 'kivetito';
const isRound2 = mode === '2kor';

function checkAccess() {

  return token === TOKEN_VOTER;

function getDeviceId() {
  let id = localStorage.getItem('szavazas_did');
  if (!id) { id = 'eszkoz-' + Math.random().toString(36).substr(2,5) + '-' + Date.now().toString(36).substr(-4); localStorage.setItem('szavazas_did', id); }
  return id;
}
const DID = getDeviceId();

let dbState = {};
let localVotes1 = {};
let voterName = null;
let confirming = false;
let votedOffices = new Set();

onValue(ref(db,'state'), snap => { dbState = snap.val() || {}; render(); });

// Kivetítőn másodpercenkénti frissítés - csak az időmérő elemét
if (isProjector) {
  setInterval(() => {
    const el = document.getElementById('proj-timer');
    if (!el) return;
    const entryLog = dbState.vote1?.entryLog || {};
    const lastTs = Object.keys(entryLog).length > 0
      ? Math.max(...Object.values(entryLog).map(e=>e.ts||0)) : null;
    if (!lastTs) return;
    const secAgo = Math.round((Date.now() - lastTs) / 1000);
    const timeStr = secAgo < 60 ? `${secAgo} mp` : `${Math.round(secAgo/60)} perce`;
    el.textContent = `Utolsó belépés: ${timeStr}`;
    // Belépési számláló is
    const cnt = document.getElementById('proj-entry-count');
    if (cnt) cnt.textContent = Object.keys(entryLog).length;
  }, 1000);
}

const esc = s => String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
const R = html => { document.getElementById('root').innerHTML = html; };
const wrap = content => `<div class="wrap"><div class="card">${content}</div></div>`;

function baseUrl() { return window.location.href.split('?')[0]; }
function voterUrl() { return baseUrl()+'?token='+TOKEN_VOTER; }
function r2Url()    { return baseUrl()+'?token='+TOKEN_VOTER+'&mode=2kor'; }
function projUrl()  { return baseUrl()+'?token='+TOKEN_VOTER+'&mode=kivetito'; }
function adminUrl() { return baseUrl()+'?token='+TOKEN_ADMIN+'&mode=admin'; }

// ── Holtverseny detektálás ──
// Visszaadja: { tied: [nevek], spotsNeeded: hány hely ütközik } vagy null
function detectTieV1(results) {
  const sorted = Object.entries(results).sort((a,b)=>b[1]-a[1]);
  if (sorted.length < 12) return null;
  // Hány biztos nyertes van (akik felett nincs holtverseny)?
  // A 11. hely pontszáma
  const score11 = sorted[10][1];
  const score12 = sorted[11][1];
  if (score11 !== score12) return null;
  // Hányan kapták a 11. hely pontszámát?
  const tiedGroup = sorted.filter(([,v])=>v===score11).map(([n])=>n);
  // Hány "szabad" hely van a holtversenyes csoportnak?
  const definiteWinners = sorted.filter(([,v])=>v>score11).length;
  const spotsNeeded = 11 - definiteWinners; // ennyi győztest kell kivenni a pótszavazásból
  return { tied: tiedGroup, spotsNeeded };
}

function detectTieOffice(results) {
  const sorted = Object.entries(results).sort((a,b)=>b[1]-a[1]);
  if (sorted.length < 2) return null;
  if (sorted[0][1] === 0) return null;
  if (sorted[0][1] !== sorted[1][1]) return null;
  const topScore = sorted[0][1];
  return sorted.filter(([,v])=>v===topScore).map(([n])=>n);
}

function render() {
  if (!checkAccess()) { renderDenied(); return; }
  if (isAdmin) { renderAdmin(); return; }
  if (isProjector) { renderProjector(); return; }
  if (isRound2) { renderRound2(); return; }
  renderVoter1();
}

function renderDenied() {
  R(wrap(`<div class="access-denied">
    <div style="font-size:48px;margin-bottom:1rem">🔒</div>
    <h1>Nincs hozzáférésed</h1>
    <p style="color:#6b7280;margin-top:8px">Kérj QR kódot a szervezőktől.</p>
  </div>`));
}

// ══════════════════════════════════════
// ADMIN
// ══════════════════════════════════════
function renderAdmin() {
  const s = dbState;
  const tab = window._tab || 'setup';
  R(wrap(`
    <h1>${s.settings?.title||'Szavazás'}</h1>
    <div class="sub">${s.settings?.subtitle||'Adminisztrációs felület'}</div>
    <div class="tab-bar">
      ${['setup','control','results','log','qr'].map(t=>`<button class="tab${tab===t?' active':''}" onclick="setTab('${t}')">${{setup:'Beállítás',control:'Vezérlés',results:'Eredmények',log:'Napló',qr:'QR kódok'}[t]}</button>`).join('')}
    </div>
    <div id="tc">${adminTab(tab,s)}</div>
  `));
  if (tab==='qr') setTimeout(()=>makeAdminQRs(), 80);
}

function adminTab(tab,s) {
  if (tab==='setup')   return tabSetup(s);
  if (tab==='control') return tabControl(s);
  if (tab==='results') return tabResults(s);
  if (tab==='log')     return tabLog(s);
  if (tab==='qr')      return tabQR();
  return '';
}

function tabSetup(s) {
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  const winners = s.vote1?.winners || [];
  const wonSet = new Set(Object.values(s.vote2?.officeWinners||{}));
  let offHtml = '';
  if (winners.length) {
    offices.forEach(off => {
      const noms = s.vote2?.nominees?.[off] || [];
      const locked = ['active','closed','runoff'].includes(s.vote2?.status?.[off]);
      offHtml += `<div class="office-setup">
        <div class="office-setup-title"><span>${off}</span>
          ${s.vote2?.officeWinners?.[off]?`<span class="badge b-winner">✓ ${s.vote2.officeWinners[off]}</span>`:''}
          ${s.vote2?.status?.[off]==='runoff'?`<span class="badge b-runoff">Pótszavazás</span>`:''}
        </div>
        ${locked ? `<div class="info">Szavazás folyamatban — jelöltek: ${noms.join(', ')}</div>`
          : `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
              ${winners.map(n=>{const won=wonSet.has(n)&&!noms.includes(n),sel=noms.includes(n);
                return `<span class="chip${sel?' selected':''}${won?' used':''}" onclick="toggleNom('${off}','${esc(n)}')">${n}${sel?' ✓':''}</span>`;
              }).join('')}
             </div><div style="font-size:12px;color:#6b7280">Kijelölve: ${noms.length} fő (max 4)</div>`}
      </div>`;
    });
  }
  return `
    <h2>Általános beállítások</h2>
    <input type="text" id="s-title" placeholder="Szavazás neve" value="${s.settings?.title||''}">
    <input type="text" id="s-sub" placeholder="Alcím / szervezet neve" value="${s.settings?.subtitle||''}">
    <div style="font-size:13px;color:#6b7280;margin-bottom:6px">Tisztségek (soronként egy)</div>
    <textarea id="s-offices">${(s.settings?.offices||['Elnök','Titkár','Kincstárnok']).join('\n')}</textarea>
    <button class="btn btn-outline" onclick="saveSettings()" style="width:auto">Mentés</button>
    <hr>
    <h2>1. kör — jelöltek (max 45 fő)</h2>
    <div class="upload-zone" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept=".xlsx,.xls,.csv,.txt" onchange="handleFile(this)" style="display:none">
      <div style="font-size:28px;margin-bottom:6px">📂</div>
      <div style="font-weight:500">Fájl betöltése</div>
      <div style="font-size:13px;color:#9ca3af">Excel, CSV vagy TXT</div>
    </div>
    <div class="divider">vagy</div>
    <textarea id="ni" placeholder="Soronként egy név...">${(s.vote1?.candidates||[]).join('\n')}</textarea>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-outline" onclick="loadDemo()" style="width:auto">Demo nevek</button>
      <button class="btn btn-primary" onclick="saveCands()" style="width:auto">Mentés</button>
    </div>
    <div id="cp" style="font-size:13px;color:#6b7280">${s.vote1?.candidates?.length?s.vote1.candidates.length+' jelölt':'Nincs jelölt'}</div>
    ${winners.length?`<hr><h2>2. kör — tisztségjelöltek</h2><div class="info">Kattints a nevekre a jelöltek kijelöléséhez.</div>${offHtml}`:''}`;
}

function tabControl(s) {
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  const v1s = s.vote1?.status || 'inactive';

  // 1. kör holtverseny figyelmeztetés
  let tieWarnV1 = '';
  if (v1s === 'active' || v1s === 'runoff') {
    const res = s.vote1?.results || {};
    const winners = s.vote1?.winners || [];
    if (v1s === 'active') {
      const tieInfo = detectTieV1(res);
      if (tieInfo) {
        tieWarnV1 = `<div class="warn-box">
          <h3>⚠️ Holtverseny a 11. helyen!</h3>
          <p>Egyenlő szavazattal: <b>${tieInfo.tied.join(', ')}</b><br>Szükséges helyek: <b>${tieInfo.spotsNeeded}</b><br>Lezárás előtt döntsd el hogyan kezeled.</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-warning btn-sm" onclick="closeV1(true)">Lezárás pótszavazással</button>
            <button class="btn btn-outline btn-sm" onclick="closeV1(false)">Lezárás így (sorrend dönt)</button>
          </div>
        </div>`;
      }
    }
    if (v1s === 'runoff') {
      tieWarnV1 = `<div class="warn-box" style="background:#ede9fe;border-color:#7c3aed">
        <h3 style="color:#5b21b6">🔄 1. kör pótszavazás folyamatban</h3>
        <p style="color:#4c1d95">Jelöltek: <b>${(s.vote1?.runoffCandidates||[]).join(', ')}</b></p>
      </div>`;
    }
  }

  return `
    <h2>Szavazások vezérlése</h2>
    ${tieWarnV1}
    <div class="ctrl-row" style="flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:200px">
        <span class="ctrl-name">1. kör — tagválasztás</span>
        <span class="badge ${{inactive:'b-inactive',pre:'b-inactive',active:'b-active',closed:'b-closed',runoff:'b-runoff'}[v1s]||'b-inactive'}">${{inactive:'Inaktív',pre:'QR aktív',active:'Aktív',closed:'Lezárva',runoff:'Pótszavazás'}[v1s]||v1s}</span>
      </div>
      <div style="font-size:12px;color:#6b7280;width:100%">${Object.keys(s.vote1?.entryLog||{}).length} belépett / ${s.vote1?.voterCount||0} szavazott</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="preV1()">QR</button>
        <button class="btn btn-success btn-sm" onclick="startV1()">Indítás</button>
        <button class="btn btn-outline btn-sm" onclick="resetV1()">Reset</button>
        <button class="btn btn-danger btn-sm" onclick="closeV1(false)">Lezárás</button>
      </div>
    </div>
    ${offices.map(off => {
      const st = s.vote2?.status?.[off] || 'inactive';
      const vc = s.vote2?.voterCount?.[off] || 0;
      const res = s.vote2?.results?.[off] || {};
      const tied = (st==='active'||st==='runoff') ? detectTieOffice(res) : null;
      let tieWarn = '';
      if (tied && st==='active') {
        tieWarn = `<div class="warn-box" style="margin:8px 0 0">
          <h3>⚠️ Holtverseny!</h3>
          <p>Egyenlő szavazattal: <b>${tied.join(', ')}</b></p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-warning btn-sm" onclick="closeOff('${off}',true)">Pótszavazás</button>
            <button class="btn btn-outline btn-sm" onclick="closeOff('${off}',false)">Lezárás így</button>
          </div>
        </div>`;
      }
      if (st==='runoff') {
        tieWarn = `<div style="font-size:12px;color:#5b21b6;margin-top:4px">🔄 Pótszavazás — jelöltek: ${(s.vote2?.runoffNominees?.[off]||[]).join(', ')}</div>`;
      }
      return `<div class="ctrl-row" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="ctrl-name">2. kör — ${off}</span>
          <span class="badge ${{inactive:'b-inactive',active:'b-active',closed:'b-closed',runoff:'b-runoff'}[st]||'b-inactive'}">${{inactive:'Inaktív',active:'Aktív',closed:'Lezárva',runoff:'Pótszavazás'}[st]||st}</span>
          <span style="font-size:13px;color:#6b7280">${vc} szavazat</span>
          <button class="btn btn-success btn-sm" onclick="startOff('${off}')">Indítás</button>
          <button class="btn btn-outline btn-sm" onclick="resetOff('${off}')">Reset</button>
          <button class="btn btn-danger btn-sm" onclick="closeOff('${off}',false)">Lezárás</button>
        </div>
        ${tieWarn}
      </div>`;
    }).join('')}`;
}

function tabResults(s) {
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  let h = '';
  if (s.vote1?.results) {
    const sorted = Object.entries(s.vote1.results).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const ws = new Set(s.vote1.winners||[]);
    const tieInfo1 = s.vote1?.status==='active' ? detectTieV1(s.vote1.results) : null;
    const tiedSet = new Set(tieInfo1?.tied||[]);
    h += `<h2 style="margin-bottom:12px">1. kör</h2>`;
    if (ws.size) h += `<div class="winner-box">Nyertesek: ${[...ws].join(', ')}</div>`;
    sorted.slice(0,20).forEach(([n,c],i) => {
      const w=ws.has(n), t=tiedSet.has(n);
      h+=`<div class="result-row">
        <div class="result-name">${w?'✓ ':t?'⚡ ':''}<b style="font-weight:${w||t?'600':'400'}">${n}</b></div>
        <div class="bar-wrap"><div class="bar${w?' winner-bar':t?' tie-bar':''}" style="width:${Math.round(c/max*100)}%"></div></div>
        <div class="result-cnt">${c}${t?`<span class="badge b-tie" style="margin-left:4px;padding:1px 5px;font-size:10px">=</span>`:''}</div>
      </div>`;
    });
    h += '<hr>';
  }
  offices.forEach(off => {
    const res = s.vote2?.results?.[off]; if(!res) return;
    const sorted = Object.entries(res).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const win = s.vote2?.officeWinners?.[off];
    const st = s.vote2?.status?.[off];
    const tied = st==='active' ? detectTieOffice(res) : null;
    const tiedSet = new Set(tied||[]);
    h += `<h2 style="margin-bottom:12px">${off}${st==='runoff'?' <span class="badge b-runoff">Pótszavazás</span>':''}</h2>`;
    if (win) h += `<div class="winner-box">Megválasztva: <b>${win}</b></div>`;
    sorted.forEach(([n,c]) => {
      const w=win===n, t=tiedSet.has(n);
      h+=`<div class="result-row">
        <div class="result-name">${w?'✓ ':t?'⚡ ':''}<b style="font-weight:${w||t?'600':'400'}">${n}</b></div>
        <div class="bar-wrap"><div class="bar${w?' winner-bar':t?' tie-bar':''}" style="width:${Math.round(c/max*100)}%"></div></div>
        <div class="result-cnt">${c}</div>
      </div>`;
    });
    h += '<hr>';
  });
  return h || '<div class="info">Még nincsenek eredmények.</div>';
}

      <td><button class="btn btn-danger btn-sm" onclick="delV1('${did}')">Töröl</button></td>

    ${e2.map(([key,e])=>`<tr>

function renderVoter1() {
  const s = dbState;
  const title = s.settings?.title || 'Szavazás';
  const subtitle = s.settings?.subtitle || '';
  const status = s.vote1?.status || 'inactive';
  const cands = status==='runoff' ? (s.vote1?.runoffCandidates||[]) : (s.vote1?.candidates||[]);
  const voted = s.vote1?.log?.[DID];
  // Pre fázisban automatikusan logoljuk a belépést
  if (status==='pre' && !s.vote1?.entryLog?.[DID]) {
    update(ref(db,`state/vote1/entryLog/${DID}`), { ts: Date.now() });
  }

  let body = '';
  if (voted) {
    body=`<div class="success-screen"><div class="success-icon">✅</div><h2>Már szavaztál!</h2><p style="color:#6b7280;margin-top:8px">Szavazatod rögzítve.</p><div class="device-id-box">Eszköz azonosítód: <b>${DID}</b></div></div>`;
  } else if (status==='inactive') {
    body=`<div class="info" style="text-align:center;padding:2rem">A szavazás még nem kezdődött el.</div>`;
  } else if (status==='pre') {
    const entryCount = Object.keys(s.vote1?.entryLog||{}).length;
    body=`<div class="success-screen">
      <div class="success-icon">✅</div>
      <h2>Csatlakozva!</h2>
      <p style="color:#6b7280;margin-top:8px">Felkészültél a szavazásra.<br>Várd meg az admin jelzését.</p>
      <div style="font-size:14px;color:#9ca3af;margin-top:12px">${entryCount} fő csatlakozott eddig</div>
      <div class="device-id-box">Eszköz azonosítód: <b>${DID}</b></div>
    </div>`;
  } else if (status==='closed') {
    body=`<div class="info" style="text-align:center;padding:2rem">A szavazás lezárult.</div>`;
  } else if (status==='runoff') {
    const spotsNeeded=dbState.vote1?.runoffSpotsNeeded||1;
    const checked=Object.keys(localVotes1).filter(k=>localVotes1[k]);
    body=`<div class="warn-box"><h3>🔄 Pótszavazás</h3><p>Holtverseny miatt pótszavazás. Válassz <b>${spotsNeeded}</b> jelöltet az alábbiak közül.</p></div>
      <div class="counter">Kiválasztva: <span>${checked.length}</span> / ${spotsNeeded}</div>
      <div class="cand-grid">
        ${cands.map(c=>{const ch=!!localVotes1[c],dis=!ch&&checked.length>=spotsNeeded;
          return `<label class="cand-item${ch?' checked':''}${dis?' disabled':''}">
            <input type="checkbox" ${ch?'checked':''} ${dis?'disabled':''} onchange="tv1('${esc(c)}',this.checked)">${c}
          </label>`;
        }).join('')}
      </div>
      <button class="btn btn-primary" onclick="subV1()">Szavazat leadása</button>
      <div class="device-id-box">Eszköz azonosítód: <b>${DID}</b></div>`;
  } else {
    const checked=Object.keys(localVotes1).filter(k=>localVotes1[k]);
    body=`<div class="counter">Kiválasztva: <span>${checked.length}</span> / 11</div>
      <div class="cand-grid">
        ${cands.map(c=>{const ch=!!localVotes1[c],dis=!ch&&checked.length>=11;
          return `<label class="cand-item${ch?' checked':''}${dis?' disabled':''}">
            <input type="checkbox" ${ch?'checked':''} ${dis?'disabled':''} onchange="tv1('${esc(c)}',this.checked)">${c}
          </label>`;
        }).join('')}
      </div>
      <button class="btn btn-primary" onclick="subV1()">Szavazat leadása</button>
      <div class="device-id-box">Eszköz azonosítód: <b>${DID}</b></div>`;
  }
  R(wrap(`<h1>${title}</h1><div class="sub">${subtitle}</div>${body}`));
}

function renderRound2() {

  const title = s.settings?.title || 'Szavazás';
  const winners = s.vote1?.winners || [];
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];

    R(wrap(`<h1>${title}</h1><div class="info" style="text-align:center;padding:2rem">Az 1. kör még nem zárult le.</div>`));

  }

    R(wrap(`<h1>${title}</h1><h2 style="margin-bottom:8px">Ki vagy?</h2>
      <div class="info">Keresd meg a nevedet és kattints rá.</div>
      <div class="name-list">
        ${winners.map(n=>{const used=!!li[n.replace(/ /g,'_')];
          return `<button class="name-btn${used?' used':''}" onclick="selName('${esc(n)}')">${n}${used?' <span style="font-size:12px;color:#9ca3af">(már szavazott)</span>':''}</button>`;
        }).join('')}

  }
  if (confirming) {
    R(wrap(`<h1>${title}</h1>

        <div style="font-size:14px;color:#6b7280">Ezt a nevet választotta:</div>
        <div class="confirm-name">${voterName}</div>
        <div style="font-size:14px;color:#6b7280">Ön az?</div>

  const hdr=`<div class="voter-header">👤 <b>${voterName}</b> &nbsp;|&nbsp; <span style="opacity:.7;font-size:12px">Eszköz: ${DID}</span></div>`;
  const activeOff = offices.find(o=>['active','runoff'].includes(s.vote2?.status?.[o]));

  if (votedOffices.has(activeOff)) {

  R(wrap(`${hdr}<h1>${title}</h1>

    ${st==='runoff'?`<div class="warn-box"><p>Holtverseny miatt pótszavazás a jelöltek között.</p></div>`:'<div class="info">Válaszd ki a jelöltek közül.</div>'}
    ${noms.map(n=>{const w=wonSet.has(n);return `<label class="radio-opt${w?' disabled':''}">
      <input type="radio" name="pick" value="${n}" ${w?'disabled':''}>${n}${w?' <span class="badge b-closed" style="margin-left:4px">Már megválasztva</span>':''}
    </label>`;}).join('')}
    <button class="btn btn-primary" style="margin-top:12px" onclick="subOff('${activeOff}')">Szavazat leadása</button>`));
}

function renderProjector() {
  const s = dbState;
  const title = s.settings?.title || 'Szavazás';
  const offices = s.settings?.offices || ['Elnök','Titkár','Kincstárnok'];
  const v1s = s.vote1?.status || 'inactive';
  const activeOff = offices.find(o=>['active','runoff'].includes(s.vote2?.status?.[o]));
  const lastClosed = [...offices].reverse().find(o=>s.vote2?.status?.[o]==='closed');
  const anyVote = !['inactive','pre'].includes(v1s) || activeOff || lastClosed;
  const isPre = v1s === 'pre' && !anyVote;

  // QR: 2. kör aktív → 2. kör QR, egyébként mindig 1. kör QR
  const showR2QR = !!(activeOff || lastClosed);
  const qrId    = showR2QR ? 'pqr2' : 'pqr1';
  const qrUrl   = showR2QR ? r2Url() : voterUrl();
  const qrLabel = showR2QR ? '2. kör (11 nyertes)' : '1. kör szavazók';
  const qrSideHtml = `<div class="proj-qr-side"><div class="proj-qr-item"><div id="${qrId}"></div><div class="proj-qr-label">${qrLabel}</div></div></div>`;

  if (!anyVote) {
    const entryLog = s.vote1?.entryLog || {};
    const entryCount = Object.keys(entryLog).length;
    const lastTs = entryCount > 0 ? Math.max(...Object.values(entryLog).map(e=>e.ts||0)) : null;
    const secAgo = lastTs ? Math.round((Date.now() - lastTs)/1000) : null;
    const timeStr = secAgo === null ? '' : secAgo < 60 ? `${secAgo} mp` : `${Math.round(secAgo/60)} perce`;
    const isPre = v1s === 'pre';

    if (isPre) {
      // QR fázis: nagy QR + belépési számláló
      R(`<div class="proj-wrap">
        <h1 style="font-size:32px;text-align:center;margin-bottom:2rem">${title}</h1>
        <div class="proj-waiting">
          <div style="text-align:center">
            <div class="proj-qr-big"><div id="pqr1"></div></div>
            <div style="margin-top:10px;font-size:16px;color:#6b7280">Olvasd be a QR kódot!</div>
          </div>
          <div style="text-align:center">
            <div id="proj-entry-count" style="font-size:72px;font-weight:700;color:#1a56db">${entryCount}</div>
            <div style="font-size:22px;color:#6b7280;margin-bottom:8px">fő csatlakozott</div>
            <div id="proj-timer" style="font-size:16px;color:#9ca3af">
              ${lastTs ? `Utolsó belépés: ${timeStr}` : 'Még senki nem csatlakozott'}
            </div>
          </div>
          <div style="font-size:16px;color:#9ca3af">Várakozás a szavazás indítására...</div>
        </div>
      </div>`);
      setTimeout(()=>{ makeProjQR('pqr1',voterUrl(),220); }, 80);
    } else {
      // Nyitóképernyő: nincs QR, csak szöveg
      R(`<div class="proj-wrap">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:2rem">
          <h1 style="font-size:84px;font-weight:700">${title}</h1>
          <div style="font-size:44px;color:#374151">Rövidesen kezdődik a szavazás!</div>
          <div style="font-size:42px;color:#6b7280">Kérjük készítsék elő mobiljaikat QR kód beolvasáshoz.</div>
        </div>
      </div>`);
    }
    return;
  }

  let results = '';
  if (activeOff) {
    const offSt = s.vote2?.status?.[activeOff];
    const isRunoff = offSt === 'runoff';
    const res = s.vote2?.results?.[activeOff] || {};
    // Pótszavazásnál a runoffNominees-ből indulunk ki, hogy 0 szavazatnál is látszódjanak
    const nomList = isRunoff
      ? (s.vote2?.runoffNominees?.[activeOff] || [])
      : (s.vote2?.nominees?.[activeOff] || []);
    // Minden jelölthöz megjelenítjük az aktuális eredményt (0 is)
    const displayList = nomList.map(n => [n, res[n] || 0]).sort((a,b) => b[1]-a[1]);
    const max = Math.max(...displayList.map(e=>e[1]), 1);
    const tied = detectTieOffice(res);
    const tiedSet = new Set(tied || []);
    results=`<div style="font-size:20px;color:#6b7280;margin-bottom:6px">${activeOff}${isRunoff?' — Pótszavazás':' szavazás'}</div>
      <div style="font-size:14px;color:#9ca3af;margin-bottom:1.5rem">Leadott szavazat: ${displayList.reduce((a,b)=>a+b[1],0)}</div>
      ${displayList.map(([n,c])=>{const t=tiedSet.has(n);return `<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:22px;font-weight:600">${t?'⚡ ':''}${n}</span>
          <span style="font-size:22px;font-weight:700;color:${t?'#d97706':'#1a56db'}">${c}</span>
        </div>
        <div style="background:#e5e7eb;border-radius:6px;height:28px;overflow:hidden">
          <div style="height:100%;background:${t?'#d97706':'#1a56db'};border-radius:6px;width:${Math.round(c/max*100)}%;transition:width .5s"></div>
        </div>
      </div>`;}).join('')}`;
  } else if (lastClosed) {
    const res=s.vote2?.results?.[lastClosed]||{};
    const sorted=Object.entries(res).sort((a,b)=>b[1]-a[1]);
    const max=Math.max(...sorted.map(e=>e[1]),1);
    const win=s.vote2?.officeWinners?.[lastClosed];
    // Teljes jelöltek listája (eredeti nominees + runoff nominees)
    const allNoms=[...new Set([...(s.vote2?.nominees?.[lastClosed]||[]),...(s.vote2?.runoffNominees?.[lastClosed]||[])])];
    const allResults=allNoms.map(n=>[n,res[n]||0]).sort((a,b)=>b[1]-a[1]);
    const allMax=Math.max(...allResults.map(e=>e[1]),1);
    results=`<div style="font-size:20px;color:#6b7280;margin-bottom:6px">${lastClosed} — Végeredmény</div>
      ${win?`<div style="font-size:32px;font-weight:700;color:#057a55;margin-bottom:1.5rem">✓ Megválasztva: ${win}</div>`:''}
      ${allResults.map(([n,c])=>{const w=win===n;return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:20px;font-weight:${w?'700':'400'};color:${w?'#057a55':'inherit'}">${w?'✓ ':''}${n}</span>
          <span style="font-size:20px;font-weight:700;color:${w?'#057a55':'#1a56db'}">${c}</span>
        </div>
        <div style="background:#e5e7eb;border-radius:4px;height:24px;overflow:hidden">
          <div style="height:100%;background:${w?'#057a55':'#1a56db'};border-radius:4px;width:${Math.round(c/allMax*100)}%;transition:width .5s"></div>
        </div>
      </div>`;}).join('')}`;
  } else {
    const v1res = s.vote1?.results || {};
    const isRunoff1 = v1s === 'runoff';
    // Pótszavazásnál a runoffCandidates-ből indulunk ki
    const displayList1 = isRunoff1
      ? (s.vote1?.runoffCandidates || []).map(n => [n, v1res[n] || 0]).sort((a,b)=>b[1]-a[1])
      : Object.entries(v1res).sort((a,b)=>b[1]-a[1]).slice(0,15);
    const max1 = Math.max(...displayList1.map(e=>e[1]), 1);
    const ws = new Set(s.vote1?.winners || []);
    const tieInfoP = v1s==='active' ? detectTieV1(v1res) : null;
    const tiedSet = new Set(tieInfoP?.tied || []);
    results=`<div style="font-size:20px;color:#6b7280;margin-bottom:6px">1. kör — Tagválasztás${isRunoff1?' (Pótszavazás)':''}</div>
      <div style="font-size:14px;color:#9ca3af;margin-bottom:1.5rem">
        Szavazott: <b style="color:#1a56db">${s.vote1?.voterCount||0}</b>
        ${Object.keys(s.vote1?.entryLog||{}).length > 0 ? ` / ${Object.keys(s.vote1?.entryLog||{}).length} belépett` : ''}
      </div>
      ${displayList1.map(([n,c])=>{const w=ws.has(n)&&v1s==='closed',t=tiedSet.has(n);return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:18px;font-weight:${w||t?'700':'400'};color:${w?'#057a55':t?'#d97706':'inherit'}">${w?'✓ ':t?'⚡ ':''}${n}</span>
          <span style="font-size:18px;font-weight:600;color:${w?'#057a55':t?'#d97706':'#1a56db'}">${c}</span>
        </div>
        <div style="background:#e5e7eb;border-radius:4px;height:20px;overflow:hidden">
          <div style="height:100%;background:${w?'#057a55':t?'#d97706':'#1a56db'};border-radius:4px;width:${Math.round(c/max1*100)}%;transition:width .5s"></div>
        </div>
      </div>`;}).join('')}`;
  }

  R(`<div class="proj-wrap">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem">
      <h1 style="font-size:28px">${title}</h1>
      <span style="font-size:13px;color:#9ca3af">Élő eredmény</span>
    </div>
    <div class="proj-qr-row">
      <div class="proj-results">${results}</div>
      ${qrSideHtml}
    </div>
  </div>`);
  setTimeout(()=>{ makeProjQR(qrId, qrUrl, 120); }, 80);
}

function makeProjQR(id,url,size) {
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML='';
  new QRCode(el,{text:url,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
}

window.handleFile = inp => {
  const file=inp.files[0]; if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='xlsx'||ext==='xls') {
    reader.onload=async e=>{
      const X=await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
      const wb=X.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=X.utils.sheet_to_json(ws,{header:1});
      document.getElementById('ni').value=data.flat().map(v=>String(v).trim()).filter(v=>v&&v.length>1).slice(0,45).join('\n');
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload=e=>{ document.getElementById('ni').value=e.target.result.split(/\r?\n|,|;/).map(s=>s.trim()).filter(Boolean).slice(0,45).join('\n'); };
    reader.readAsText(file,'UTF-8');
  }
};

window.preV1 = async () => {
  if(!dbState.vote1?.candidates?.length){alert('Töltsd be a jelölteket!');return;}
  await update(ref(db,'state/vote1'),{status:'pre',entryLog:{},voterCount:0,log:{}});
};

window.startV1 = async () => {
  if(!dbState.vote1?.candidates?.length){alert('Töltsd be a jelölteket!');return;}
  const res={}; (dbState.vote1.candidates).forEach(c=>res[c]=0);
  await update(ref(db,'state/vote1'),{status:'active',results:res,voterCount:0,log:{}});
};

window.resetV1 = async () => {
  if(!confirm('Reset? Minden szavazat törlődik!')) return;
  const res={}; (dbState.vote1?.candidates||[]).forEach(c=>res[c]=0);
  await update(ref(db,'state/vote1'),{status:'inactive',results:res,winners:[],voterCount:0,log:{},entryLog:{},runoffCandidates:[],runoffSpotsNeeded:0});
  localVotes1={};
};

window.closeV1 = async (withRunoff) => {
  const results = dbState.vote1?.results || {};
  const sorted = Object.entries(results).sort((a,b)=>b[1]-a[1]);
  if (withRunoff) {
    const tieInfo = detectTieV1(results);
    if (!tieInfo) return;
    const definite = sorted.filter(([,v])=>v>sorted[10][1]).map(e=>e[0]);
    await update(ref(db,'state/vote1'),{
      status:'runoff',
      winners:definite,
      runoffCandidates:tieInfo.tied,
      runoffSpotsNeeded:tieInfo.spotsNeeded,
      results:{},
      voterCount:0,
      log:{}
    });
    localVotes1={};
  } else {
    const winners = sorted.slice(0,11).map(e=>e[0]);
    await update(ref(db,'state/vote1'),{status:'closed',winners});
  }
};

window.delV1 = async did => {
  if(!confirm('Törlöd ezt a szavazatot?')) return;
  const entry=dbState.vote1?.log?.[did]; if(!entry) return;
  const upd={};
  (entry.votes||[]).forEach(c=>{ upd[`state/vote1/results/${c}`]=Math.max((dbState.vote1?.results?.[c]||1)-1,0); });
  upd['state/vote1/voterCount']=Math.max((dbState.vote1?.voterCount||1)-1,0);
  upd[`state/vote1/log/${did}`]=null;
  await update(ref(db),upd);
};

window.toggleNom = async (off,name) => {
  const noms=[...(dbState.vote2?.nominees?.[off]||[])];
  const idx=noms.indexOf(name);
  if(idx>=0) noms.splice(idx,1); else if(noms.length<4) noms.push(name);
  await update(ref(db,'state/vote2/nominees'),{[off]:noms});
};

window.startOff = async off => {
  const st = dbState.vote2?.status?.[off];
  const noms = st==='runoff'
    ? (dbState.vote2?.runoffNominees?.[off]||[])
    : (dbState.vote2?.nominees?.[off]||[]);
  if(!noms.length){alert('Jelöld ki a jelölteket!');return;}
  const res={}; noms.forEach(n=>res[n]=0);
  await update(ref(db,`state/vote2/status`),{[off]:'active'});
  await update(ref(db,`state/vote2/results`),{[off]:res});
  await update(ref(db,`state/vote2/voterCount`),{[off]:0});
};

window.resetOff = async off => {
  if(!confirm(`Reset: ${off}?`)) return;
  const noms=dbState.vote2?.nominees?.[off]||[];
  const res={}; noms.forEach(n=>res[n]=0);
  await update(ref(db,`state/vote2/status`),{[off]:'inactive'});
  await update(ref(db,`state/vote2/results`),{[off]:res});
  await update(ref(db,`state/vote2/officeWinners`),{[off]:null});
  await update(ref(db,`state/vote2/runoffNominees`),{[off]:[]});
  votedOffices.delete(off);
};

window.closeOff = async (off, withRunoff) => {
  const res=dbState.vote2?.results?.[off]||{};
  if (withRunoff) {
    const tied=detectTieOffice(res);
    if(!tied) return;
    const runoffRes={}; tied.forEach(n=>runoffRes[n]=0);
    await update(ref(db,`state/vote2/status`),{[off]:'runoff'});
    await update(ref(db,`state/vote2/runoffNominees`),{[off]:tied});
    await update(ref(db,`state/vote2/results`),{[off]:runoffRes});
    await update(ref(db,`state/vote2/voterCount`),{[off]:0});
    votedOffices.delete(off);
  } else {
    const win=Object.entries(res).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
    await update(ref(db,`state/vote2/status`),{[off]:'closed'});
    if(win) await update(ref(db,`state/vote2/officeWinners`),{[off]:win});
  }
};

window.delV2 = async (key,off,vote) => {
  if(!confirm('Törlöd ezt a 2. köri szavazatot?')) return;
  const upd={};
  if(off&&vote){ upd[`state/vote2/results/${off}/${vote}`]=Math.max((dbState.vote2?.results?.[off]?.[vote]||1)-1,0); }
  upd[`state/vote2/voterCount/${off}`]=Math.max((dbState.vote2?.voterCount?.[off]||1)-1,0);
  upd[`state/vote2/log/${key}`]=null;
  await update(ref(db),upd);
};



window.tv1=(n,ch)=>{ localVotes1[n]=ch; renderVoter1(); };
window.subV1=async()=>{
  const status=dbState.vote1?.status;
  const isRunoff=status==='runoff';
  const spotsNeeded=dbState.vote1?.runoffSpotsNeeded||1;
  const picked=Object.keys(localVotes1).filter(k=>localVotes1[k]);
  if(!picked.length){alert('Válassz legalább egy jelöltet!');return;}
  if(isRunoff&&picked.length>spotsNeeded){alert(`Pótszavazásnál legfeljebb ${spotsNeeded} jelöltet választhatsz!`);return;}
  const upd={};
  picked.forEach(c=>{ upd[`state/vote1/results/${c}`]=(dbState.vote1?.results?.[c]||0)+1; });
  upd['state/vote1/voterCount']=(dbState.vote1?.voterCount||0)+1;
  upd[`state/vote1/log/${DID}`]={ts:Date.now(),votes:picked};
  await update(ref(db),upd);
  localVotes1={};
};

window.subOff=async off=>{
  const pick=document.querySelector('input[name="pick"]:checked')?.value;
  if(!pick){alert('Válassz egy jelöltet!');return;}
  const cur=(dbState.vote2?.results?.[off]?.[pick]||0);

  const logKey=`${voterName.replace(/ /g,'_')}_${off.replace(/ /g,'_')}`;
  const upd={};
  upd[`state/vote2/results/${off}/${pick}`]=cur+1;
  upd[`state/vote2/voterCount/${off}`]=vc;
  upd[`state/vote2/log/${logKey}`]={ts:Date.now(),voterName,office:off,vote:pick};
  await update(ref(db),upd);
  votedOffices.add(off);
  renderRound2();
};
