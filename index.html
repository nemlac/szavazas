<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szavazás</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:16px;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:700px;margin:0 auto;padding:1rem 1rem 3rem}
.card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
h2{font-size:17px;font-weight:600;margin-bottom:12px}
h3{font-size:15px;font-weight:600;margin-bottom:8px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
.btn{display:inline-block;padding:11px 20px;border-radius:8px;border:none;font-size:15px;font-weight:500;cursor:pointer;text-align:center;margin-bottom:8px;width:100%;transition:all .15s}
.btn-primary{background:#1a56db;color:#fff}.btn-primary:hover{background:#1e429f}
.btn-success{background:#057a55;color:#fff}.btn-success:hover{background:#046c4e}
.btn-danger{background:#c81e1e;color:#fff}.btn-danger:hover{background:#9b1c1c}
.btn-warning{background:#d97706;color:#fff}.btn-warning:hover{background:#b45309}
.btn-outline{background:#fff;color:#1a1a1a;border:1.5px solid #d1d5db}.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:6px 12px;font-size:13px;width:auto;margin:0}
.btn-xs{padding:4px 8px;font-size:12px;width:auto;margin:0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.b-gray{background:#f3f4f6;color:#6b7280}
.b-blue{background:#dbeafe;color:#1e40af}
.b-green{background:#d1fae5;color:#065f46}
.b-red{background:#fee2e2;color:#991b1b}
.b-yellow{background:#fef3c7;color:#92400e}
.b-purple{background:#ede9fe;color:#5b21b6}
input[type=text],input[type=email],input[type=password],input[type=number],textarea,select{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:8px;color:#1a1a1a}
input:focus,textarea:focus,select:focus{outline:none;border-color:#1a56db}
textarea{resize:vertical}
label.field{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row .btn{width:auto;margin-bottom:0}
.cand-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
@media(max-width:400px){.cand-grid{grid-template-columns:1fr}}
.cand-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;transition:all .15s;user-select:none}
.cand-item:hover{border-color:#1a56db;background:#eff6ff}
.cand-item.checked{border-color:#1a56db;background:#eff6ff}
.cand-item.disabled{opacity:.35;pointer-events:none}
.cand-item input[type=checkbox]{width:16px;height:16px;accent-color:#1a56db;flex-shrink:0}
.counter{font-size:15px;font-weight:500;color:#6b7280;margin-bottom:12px;padding:10px 14px;background:#f9fafb;border-radius:8px}
.counter span{color:#1a56db;font-size:22px;font-weight:700}
.info{background:#f9fafb;border-radius:8px;padding:12px 14px;font-size:14px;color:#6b7280;margin-bottom:12px;line-height:1.6}
.warn{background:#fef3c7;border:1.5px solid #d97706;border-radius:10px;padding:1rem;margin-bottom:1rem}
.warn h3{color:#92400e;margin-bottom:6px}
.warn p{color:#78350f;font-size:13px;margin-bottom:10px}
.success-box{background:#d1fae5;border:1.5px solid #057a55;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:14px;color:#065f46}
.error-box{background:#fee2e2;border:1.5px solid #c81e1e;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:14px;color:#991b1b}
.tab-bar{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:1.5rem;overflow-x:auto;gap:0}
.tab{padding:10px 14px;font-size:14px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:500}
.result-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.result-name{width:160px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-wrap{flex:1;background:#f3f4f6;border-radius:4px;height:20px;overflow:hidden}
.bar{height:100%;background:#1a56db;border-radius:4px;transition:width .5s}
.bar.w{background:#057a55}.bar.t{background:#d97706}
.result-cnt{font-size:14px;font-weight:600;width:28px;text-align:right;color:#6b7280;flex-shrink:0}
.szavazas-card{border:1px solid #e5e7eb;border-radius:10px;padding:1rem;margin-bottom:10px;cursor:pointer;transition:all .15s}
.szavazas-card:hover{border-color:#1a56db;background:#f0f7ff}
.szavazas-card.active-card{border-color:#1a56db;background:#eff6ff}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:#6b7280}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.success-screen{text-align:center;padding:2rem 1rem}
.success-icon{font-size:56px;margin-bottom:1rem}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:#9ca3af;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
hr{border:none;border-top:1px solid #e5e7eb;margin:1.5rem 0}
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px}
.upload-zone:hover{border-color:#1a56db;background:#f0f7ff}
.kod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
@media(max-width:400px){.kod-grid{grid-template-columns:repeat(3,1fr)}}
.kod-chip{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:6px 4px;text-align:center;font-family:monospace;font-size:13px;font-weight:600;letter-spacing:.05em}
.kod-chip.used{opacity:.4;text-decoration:line-through}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #e5e7eb;color:#6b7280;font-weight:500}
td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:hover td{background:#f9fafb}
/* KIVETÍTŐ */
.proj{max-width:1000px;margin:0 auto;padding:2rem;min-height:100vh}
.proj-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;text-align:center;gap:2rem}
.proj-qr-big{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1);display:inline-block}
.proj-stat{font-size:80px;font-weight:700;color:#1a56db;line-height:1}
.proj-stat-label{font-size:22px;color:#6b7280}
.proj-results-wrap{display:flex;gap:3rem;align-items:flex-start}
.proj-results{flex:1}
.proj-qr-side{flex-shrink:0;text-align:center}
.proj-qr-side-label{font-size:12px;color:#9ca3af;margin-top:6px}
</style>
</head>
<body>
<div id="root"><div class="wrap"><div class="card"><div class="loading"><div class="spinner"></div><span>Betöltés...</span></div></div></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyBcrATH0W2VVbLI2lfVvoT2V9CmhgvOQn4",
  authDomain:"szavazas-dd648.firebaseapp.com",
  databaseURL:"https://szavazas-dd648-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"szavazas-dd648",
  storageBucket:"szavazas-dd648.firebasestorage.app",
  messagingSenderId:"320150428563",
  appId:"1:320150428563:web:7332b408496db091ec6666"
});
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

// ── Verzió ──
const VERSION = 'v1.1.23';

// ── Routing ──
const P = new URLSearchParams(window.location.search);
const mode = P.get('mode') || 'mobil';
const isAdmin = mode === 'admin';
const isKezelo = mode === 'kezelo';
const isKivetito = mode === 'kivetito';
const isMobil = mode === 'mobil';

// ── Globális állapot ──
let DB = {};
let currentUser = null;
let selectedSzavazasId = null;
let localVotes = {};
let voterCodeInput = '';

// sessionStorage wrapper - ha blokkolva van, memóriában tároljuk
const _szId = new URLSearchParams(window.location.search).get('s') || '';
function ssGet(key) { try { return sessionStorage.getItem(key); } catch(e) { return null; } }
function ssSet(key, val) { try { sessionStorage.setItem(key, val); } catch(e) {} }
function ssRemove(key) { try { sessionStorage.removeItem(key); } catch(e) {} }
let voterCode = ssGet('voterCode_' + _szId) || null;

// ── Auth — ez fut először ──
onAuthStateChanged(auth, user => {
  currentUser = user;
  // Ha kivetítő vagy mobil, nem kell auth
  if (isKivetito || isMobil) return;
  // Admin/kezelő: azonnal mutatjuk a login-t vagy a felületet
  renderApp();
});


// ── Helpers ──
const R = html => document.getElementById('root').innerHTML = html;
const wrap = c => `<div class="wrap"><div class="card">${c}</div><div style="text-align:center;font-size:11px;color:#d1d5db;padding:4px 0 8px">${VERSION}</div></div>`;
const esc = s => String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
const fmtTime = ts => ts ? new Date(ts).toLocaleTimeString('hu') : '-';
const secAgo = ts => ts ? Math.round((Date.now()-ts)/1000) : null;
const timeStr = ts => { const s=secAgo(ts); if(s===null) return ''; if(s<=0) return 'most'; return s<60?`${s} mp`:`${Math.round(s/60)} perce`; };


// ── Firebase listener ──
onValue(ref(db,'szavazasok'), snap => { DB.szavazasok = snap.val() || {}; renderApp(); });
onValue(ref(db,'aktiv'), snap => { DB.aktiv = snap.val() || null; renderApp(); });

// ── Első render ──
renderApp();

function baseUrl() { return window.location.href.split('?')[0]; }
function mobilUrl(szavazasId) { return `${baseUrl()}?mode=mobil&s=${szavazasId}`; }
function kivetUrl() { return `${baseUrl()}?mode=kivetito`; }
function adminUrl() { return `${baseUrl()}?mode=admin`; }
function kezeloUrl() { return `${baseUrl()}?mode=kezelo`; }

function getSzavazas() {
  if (!selectedSzavazasId || !DB.szavazasok) return null;
  return DB.szavazasok[selectedSzavazasId] || null;
}

function getAktivSzavazas() {
  if (!DB.aktiv || !DB.szavazasok) return null;
  return DB.szavazasok[DB.aktiv] || null;
}

function renderApp() {
  if (isKivetito) { renderKivetito(); return; }
  if (isMobil) { renderMobil(); return; }
  // Admin/kezelő: ha nincs user → login; ha van → felület
  if (!currentUser) { renderLogin(); return; }
  if (isAdmin) { renderAdmin(); return; }
  if (isKezelo) { renderKezelo(); return; }
  // Ismeretlen mode → login
  renderLogin();
}

// ══════════════════════════════════════
// LOGIN
// ══════════════════════════════════════
function renderLogin() {
  const roleLabel = isAdmin ? 'Admin' : isKezelo ? 'Kezelő' : isKivetito ? 'Kivetítő' : '';
  R(wrap(`
    <h1>Szavazási rendszer</h1>
    <div class="sub">${roleLabel} belépés</div>
    <label class="field">Email</label>
    <input type="email" id="l-email" placeholder="email@example.com">
    <label class="field">Jelszó</label>
    <input type="password" id="l-pass" placeholder="••••••••">
    <div id="l-err" class="error-box" style="display:none"></div>
    <button class="btn btn-primary" onclick="doLogin()">Belépés</button>
    <hr>
    <div style="font-size:13px;color:#9ca3af">
      <div>Admin: <b>${adminUrl()}</b></div>
      <div>Kezelő: <b>${kezeloUrl()}</b></div>
      <div>Kivetítő: <b>${kivetUrl()}</b></div>
    </div>
    <div style="text-align:center;font-size:11px;color:#d1d5db;margin-top:1rem">${VERSION}</div>
  `));
}

window.doLogin = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.style.display = 'block';
    err.textContent = 'Hibás email vagy jelszó.';
  }
};

window.doLogout = async () => { await signOut(auth); };

// ══════════════════════════════════════
// ADMIN
// ══════════════════════════════════════
function renderAdmin() {
  const tab = window._adminTab || 'szavazasok';
  const sz = getSzavazas();

  R(wrap(`
    <div class="row" style="margin-bottom:1rem">
      <div style="flex:1">
        <h1 style="margin:0">Admin</h1>
        <div style="font-size:11px;color:#9ca3af;margin-top:2px">v1.1.23</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Kilépés</button>
    </div>
    <div class="tab-bar">
      <button class="tab ${tab==='szavazasok'?'active':''}" onclick="setAdminTab('szavazasok')">Szavazások</button>
      <button class="tab ${tab==='vezerles'?'active':''}" onclick="setAdminTab('vezerles')">Vezérlés</button>
      <button class="tab ${tab==='kodok'?'active':''}" onclick="setAdminTab('kodok')">Kódok</button>
      <button class="tab ${tab==='naplo'?'active':''}" onclick="setAdminTab('naplo')">Napló</button>
      <button class="tab ${tab==='kivetito'?'active':''}" onclick="setAdminTab('kivetito')">Kivetítő</button>
    </div>
    <div id="admin-tab">${renderAdminTab(tab)}</div>
  `));
  if (tab==='kivetito') setTimeout(()=>makeQR('a-qr-mobil', mobilUrl(selectedSzavazasId||DB.aktiv||''), 140), 80);
  if (tab==='szavazasok') setTimeout(()=>initSortable(), 80);
}

window.setAdminTab = t => { window._adminTab=t; renderAdmin(); };

function renderAdminTab(tab) {
  if (tab==='szavazasok') return tabSzavazasok();
  if (tab==='vezerles') return tabVezerles();
  if (tab==='kodok') return tabKodok();
  if (tab==='naplo') return tabNaplo();
  if (tab==='kivetito') return tabKivetito();
  return '';
}

function tabSzavazasok() {
  const list = DB.szavazasok || {};
  const ids = Object.keys(list).sort((a,b) => {
    // Ha van sorrend mező, az alapján; különben létrehozás ideje
    const sa = list[a].sorrend !== undefined ? list[a].sorrend : (list[a].letrehozva||0);
    const sb = list[b].sorrend !== undefined ? list[b].sorrend : (list[b].letrehozva||0);
    return list[a].sorrend !== undefined ? sa-sb : sb-sa;
  });

  let szList = ids.length ? `<div id="sz-list">${ids.map((id, idx) => {
    const s = list[id];
    const allapot = s.allapot || 'inaktiv';
    const isAktiv = DB.aktiv === id;
    const badgeCls = {inaktiv:'b-gray',pre:'b-gray',qr:'b-blue',szavazas:'b-green',lezarva:'b-red',potszavazas:'b-purple'}[allapot]||'b-gray';
    const badgeText = {inaktiv:'Inaktív',pre:'Előkészítés',qr:'QR aktív',szavazas:'Szavazás',lezarva:'Lezárva',potszavazas:'Pótszavazás'}[allapot]||allapot;
    return `<div class="szavazas-card${selectedSzavazasId===id?' active-card':''}" data-id="${id}" onclick="selectSz('${id}')">
      <div class="row">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span class="drag-handle" title="Húzással átrendezhető" style="cursor:grab;color:#d1d5db;font-size:18px;flex-shrink:0">⠿</span>
          <span style="font-size:12px;font-weight:600;color:#9ca3af;flex-shrink:0;min-width:20px">${idx+1}.</span>
          <div style="min-width:0">
            <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.cim||'(névtelen)'}</div>
            <div style="font-size:12px;color:#9ca3af;margin-top:2px">${(s.jeloltek||[]).length} jelölt · max ${s.maxValaszt||1} választható</div>
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span class="badge ${badgeCls}">${badgeText}</span>
          ${isAktiv && allapot!=='inaktiv' ?'<span class="badge b-green">● Aktív</span>':''}
        </div>
      </div>
    </div>`;
  }).join('')}</div>` : '<div class="info">Még nincs szavazás. Hozz létre egyet!</div>';

  const sz = getSzavazas();
  const szForm = sz ? `
    <hr>
    <h2>Szavazás beállításai</h2>
    <label class="field">Cím</label>
    <input type="text" id="sz-cim" value="${esc(sz.cim||'')}">
    <label class="field">Kivetítő szöveg (PRE fázisban jelenik meg)</label>
    <textarea id="sz-kivetito-szoveg" style="height:80px">${esc(sz.kivetitoszoveg||'')}</textarea>
    <label class="field">Max választható jelöltek száma</label>
    <input type="number" id="sz-max" value="${sz.maxValaszt||1}" min="1" max="45" style="width:100px">
    <label class="field">Eredmény mutatása szavazás közben a kivetítőn?</label>
    <select id="sz-show-res">
      <option value="igen" ${sz.mutatEredmeny!==false?'selected':''}>Igen</option>
      <option value="nem" ${sz.mutatEredmeny===false?'selected':''}>Nem</option>
    </select>
    <div class="row" style="margin-bottom:1rem">
      <button class="btn btn-primary btn-sm" onclick="saveSzSettings()">Mentés</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSz()">Törlés</button>
    </div>
    <hr>
    <h2>Jelöltek</h2>
    <div class="upload-zone" onclick="document.getElementById('a-file').click()">
      <input type="file" id="a-file" accept=".xlsx,.xls,.csv,.txt" onchange="handleAdminFile(this)" style="display:none">
      <div style="font-size:22px;margin-bottom:4px">📂</div>
      <div style="font-weight:500">Fájl betöltése</div>
      <div style="font-size:13px;color:#9ca3af">Excel, CSV vagy TXT (soronként egy név)</div>
    </div>
    <div class="divider">vagy</div>
    <textarea id="a-jeloltek" style="height:150px" placeholder="Soronként egy név...">${(sz.jeloltek||[]).join('\n')}</textarea>
    <div class="row">
      <button class="btn btn-primary btn-sm" onclick="saveAdminJeloltek()">Mentés</button>
      <button class="btn btn-outline btn-sm" onclick="clearAdminJeloltek()">Törlés</button>
    </div>
    <div id="a-jeloltek-preview" style="font-size:13px;color:#6b7280;margin-top:8px">${sz.jeloltek?.length?sz.jeloltek.length+' jelölt':''}</div>
  ` : '';

  return `
    <h2>Szavazások</h2>
    ${szList}
    <button class="btn btn-success" onclick="ujSzavazas()" style="margin-top:8px">+ Új szavazás</button>
    ${szForm}`;
}

window.selectSz = id => { selectedSzavazasId = id; renderAdmin(); };

function initSortable() {
  const el = document.getElementById('sz-list');
  if (!el || typeof Sortable === 'undefined') return;
  Sortable.create(el, {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'active-card',
    onEnd: async evt => {
      // Új sorrend mentése Firebase-be
      const cards = el.querySelectorAll('.szavazas-card');
      const upd = {};
      cards.forEach((card, idx) => {
        const id = card.getAttribute('data-id');
        if (id) upd[`szavazasok/${id}/sorrend`] = idx;
      });
      await update(ref(db), upd);
    }
  });
}
window.ujSzavazas = async () => {
  const id = 'sz_' + Date.now();
  await set(ref(db,`szavazasok/${id}`), {
    cim: 'Új szavazás', allapot: 'inaktiv', letrehozva: Date.now(),
    maxValaszt: 1, jeloltek: [], mutatEredmeny: true,
    kivetitoszoveg: 'Rövidesen kezdődik a szavazás!\nKérjük készítsék elő mobiljaikat.'
  });
  selectedSzavazasId = id;
  renderAdmin();
};
window.handleAdminFile = inp => {
  const file = inp.files[0]; if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  if(ext==='xlsx'||ext==='xls') {
    reader.onload = async e => {
      const X = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');

  }
};

function renderEredmenyek(sz) {
  const res = sz.eredmenyek || {};
  const potRes = sz.potEredmenyek || {};
  const potJeloltek = new Set(sz.potJeloltek||[]);
  const winners = new Set(sz.nyertesek||[]);
  const allRes = {...res};
  Object.entries(potRes).forEach(([k,v])=>{ allRes[k]=(allRes[k]||0)+v; });
  const sorted = Object.entries(allRes).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(...sorted.map(e=>e[1]),1);
  const tieInfoRes = sz.allapot==='potszavazas' ? detectTie({results:allRes,jeloltek:sz.jeloltek||[],maxValaszt:sz.maxValaszt||1}) : null;
  const tiedSet = new Set(tieInfoRes?.tied||[]);

  return `<h3 style="margin-top:1rem">Eredmény</h3>
    ${winners.size?`<div class="success-box">Nyertesek: <b>${[...winners].join(', ')}</b></div>`:''}
    ${sorted.slice(0,20).map(([n,c])=>{
      const w=winners.has(n),t=tiedSet.has(n),p=potJeloltek.has(n);
      return `<div class="result-row">
        <div class="result-name" title="${n}">${w?'✓ ':t?'⚡ ':''}${n}${p?' *':''}</div>
        <div class="bar-wrap"><div class="bar${w?' w':t?' t':''}" style="width:${Math.round(c/max*100)}%"></div></div>
        <div class="result-cnt">${c}</div>
      </div>`;
    }).join('')}
    ${potJeloltek.size?'<div style="font-size:12px;color:#9ca3af;margin-top:4px">* pótszavazásban is részt vett</div>':''}`;
}

function detectTie(sz) {
  const results = sz.results || sz.eredmenyek || {};
  const jeloltek = sz.jeloltek || [];
  const maxV = sz.maxValaszt || 1;
  // Mennyi nyertes kell összesen?
  const totalNeeded = sz.potSpotsNeeded || maxV;
  const sorted = Object.entries(results).sort((a,b)=>b[1]-a[1]);
  if (sorted.length < totalNeeded+1) return null;
  if (sorted[0][1]===0) return null;
  const cutoffScore = sorted[totalNeeded-1][1];
  const nextScore = sorted[totalNeeded]?.[1];
  if (cutoffScore !== nextScore) return null;
  const tiedGroup = sorted.filter(([,v])=>v===cutoffScore).map(([n])=>n);
  const definiteWinners = sorted.filter(([,v])=>v>cutoffScore).length;
  const spotsNeeded = totalNeeded - definiteWinners;
  return { tied: tiedGroup, spotsNeeded };
}

window.startPotszavazas = async () => {
  const sz = getSzavazas(); if(!sz) return;

  const maxV = sz.allapot==='potszavazas' ? (sz.potSpotsNeeded||1) : (sz.maxValaszt||1);
  const tieInfo = detectTie({results:res, jeloltek:sz.jeloltek||[], maxValaszt:maxV});
  if (!tieInfo) return;
  const potRes = {}; tieInfo.tied.forEach(n=>potRes[n]=0);
  await update(ref(db,`szavazasok/${selectedSzavazasId}`), {
    allapot:'potszavazas',

window.lezarasPot = async (forceFirst=false) => {
  const sz = getSzavazas(); if(!sz) return;
  const potRes = sz.potEredmenyek||{};
  const origRes = sz.eredmenyek||{};
  const sorted = Object.entries(potRes).sort((a,b)=>b[1]-a[1]);
  const potWinners = sorted.slice(0,sz.potSpotsNeeded||1).map(e=>e[0]);
  const origSorted = Object.entries(origRes).sort((a,b)=>b[1]-a[1]);
  const score = origSorted[sz.maxValaszt>1?sz.maxValaszt-1:0]?.[1]||0;
  const definiteWinners = origSorted.filter(([,v])=>v>score).map(e=>e[0]);
  const nyertesek = [...new Set([...definiteWinners,...potWinners])];
  await update(ref(db,`szavazasok/${selectedSzavazasId}`), { allapot:'lezarva', nyertesek });
};

window.setKezeloTab = t => { window._kezeloTab=t; renderKezelo(); };

function kezeloJeloltek(sz) {
  return `
    <h2>Jelöltek — ${sz.cim}</h2>
    <div class="upload-zone" onclick="document.getElementById('k-file').click()">
      <input type="file" id="k-file" accept=".xlsx,.xls,.csv,.txt" onchange="handleKezeloFile(this)" style="display:none">
      <div style="font-size:24px;margin-bottom:4px">📂</div>
      <div style="font-weight:500">Fájl betöltése</div>
      <div style="font-size:13px;color:#9ca3af">Excel, CSV vagy TXT (soronként egy név)</div>
    </div>
    <div class="divider">vagy</div>
    <textarea id="k-jeloltek" style="height:150px" placeholder="Soronként egy név...">${(sz.jeloltek||[]).join('\n')}</textarea>
    <div class="row">
      <button class="btn btn-primary btn-sm" onclick="saveJeloltek()">Mentés</button>
      <button class="btn btn-outline btn-sm" onclick="clearJeloltek()">Törlés</button>
    </div>
    <div id="k-preview" style="font-size:13px;color:#6b7280;margin-top:8px">${sz.jeloltek?.length?sz.jeloltek.length+' jelölt':''}</div>`;
}

window.handleKezeloFile = async inp => {
  const file = inp.files[0]; if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  if(ext==='xlsx'||ext==='xls') {
    reader.onload = async e => {
      const X = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
      const wb = X.read(e.target.result,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = X.utils.sheet_to_json(ws,{header:1});
      const names = data.flat().map(v=>String(v).trim()).filter(v=>v&&v.length>1).slice(0,200);
      document.getElementById('k-jeloltek').value = names.join('\n');
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => {
      const names = e.target.result.split(/\r?\n|,|;/).map(s=>s.trim()).filter(Boolean).slice(0,200);
      document.getElementById('k-jeloltek').value = names.join('\n');
    };
    reader.readAsText(file,'UTF-8');
  }
};
window.saveJeloltek = async () => {
  const raw = document.getElementById('k-jeloltek').value;
  const jeloltek = raw.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,200);
  await update(ref(db,`szavazasok/${selectedSzavazasId}`),{jeloltek});
  document.getElementById('k-preview').textContent = jeloltek.length+' jelölt elmentve';
};
window.clearJeloltek = async () => {
  if(!confirm('Törlöd az összes jelöltet?')) return;
  await update(ref(db,`szavazasok/${selectedSzavazasId}`),{jeloltek:[]});
  document.getElementById('k-jeloltek').value='';
};

function renderKivetito() {
  const id = DB.aktiv;
  const sz = getAktivSzavazas();

  const VER_TAG = `<div style="position:fixed;bottom:8px;right:12px;font-size:11px;color:#d1d5db;z-index:99">${VERSION}</div>`;
  if (!id || !sz || sz.allapot==='inaktiv') {
    R(`<div class="proj"><div class="proj-center">
      <div style="font-size:36px;font-weight:700;color:#374151">Szavazási rendszer</div>
      <div style="font-size:20px;color:#9ca3af">Nincs aktív szavazás</div>
    </div>${VER_TAG}</div>`);
    return;
  }

  const allapot = sz.allapot||'inaktiv';
  const belep = Object.keys(sz.belepo||{}).length;
  const szavazott = sz.voterCount||0;
  const lastVote = sz.lastVoteTs;
  const mUrl = mobilUrl(id);

  // PRE fázis
  if (allapot==='pre') {
    const sorok = (sz.kivetitoszoveg||'Rövidesen kezdődik a szavazás!').split('\n');
    R(`<div class="proj"><div class="proj-center">
      <div style="font-size:42px;font-weight:700;color:#1a1a1a;text-align:center">${sz.cim||''}</div>
      ${sorok.map((s,i)=>`<div style="font-size:${i===0?'28':'22'}px;color:#374151;text-align:center">${s}</div>`).join('')}
    </div>${VER_TAG}</div>`);
    return;
  }

  // QR fázis
  if (allapot==='qr') {
    const lastEntry = belep>0 ? Math.max(...Object.values(sz.belepo||{}).map(e=>e.ts||0)) : null;
    R(`<div class="proj"><div class="proj-center">
      <div style="font-size:32px;font-weight:700">${sz.cim}</div>
      <div class="proj-qr-big"><div id="proj-qr"></div></div>
      <div style="font-size:14px;color:#9ca3af">Olvasd be a QR kódot, majd add meg az egyedi kódodat!</div>
      <div style="display:flex;gap:4rem;align-items:center">
        <div style="text-align:center">
          <div id="proj-belep" class="proj-stat">${belep}</div>
          <div class="proj-stat-label">bejelentkezett</div>
        </div>
        <div style="text-align:center">
          <div id="proj-timer" style="font-size:28px;font-weight:600;color:#6b7280">${lastEntry?timeStr(lastEntry):'–'}</div>
          <div class="proj-stat-label">utolsó belépés</div>
        </div>
      </div>
    </div></div>`);
    setTimeout(()=>makeQR('proj-qr',mUrl,240),80);
    return;
  }

  // SZAVAZÁS fázis
  if (allapot==='szavazas'||allapot==='potszavazas') {
    const mutat = sz.mutatEredmeny !== false;
    const res = allapot==='potszavazas' ? (sz.potEredmenyek||{}) : (sz.eredmenyek||{});
    const jeloltek = allapot==='potszavazas' ? (sz.potJeloltek||[]) : (sz.jeloltek||[]);
    const sorted = jeloltek.map(n=>[n,res[n]||0]).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const pct = belep>0 ? Math.round(szavazott/belep*100) : 0;
    const kész = szavazott>=belep && belep>0;
    const szinAlap = kész ? '#057a55' : '#1a56db';
    const szinVilagos = kész ? '#d1fae5' : '#dbeafe';

    // Eredmény nézet (ha mutatja)
    const resultsHtml = mutat && sorted.length ? `
      ${sorted.map(([n,c])=>`<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:22px;font-weight:500;color:#1a1a1a">${n}</span>
          <span style="font-size:22px;font-weight:700;color:${szinAlap}">${c}</span>
        </div>
        <div style="background:#e5e7eb;border-radius:6px;height:24px;overflow:hidden">
          <div style="height:100%;background:${szinAlap};border-radius:6px;width:${Math.round(c/max*100)}%;transition:width .5s"></div>
        </div>
      </div>`).join('')}` : '';

    // Számláló nézet (mindig látszik, de ha nincs eredmény akkor középen nagy)
    const szamlaloHtml = `
      <div style="text-align:center;margin-bottom:${mutat?'2rem':'0'}">
        ${allapot==='potszavazas'?`<div style="font-size:22px;color:#d97706;font-weight:600;margin-bottom:1rem">🔄 Pótszavazás</div>`:''}
        <div style="font-size:${mutat?'36':'96'}px;font-weight:700;color:${szinAlap};line-height:1;margin-bottom:${mutat?'8':'16'}px">
          <span id="proj-szavazott">${szavazott}</span> / ${belep}
        </div>
        <div style="font-size:${mutat?'16':'24'}px;color:#6b7280;margin-bottom:${mutat?'12':'24'}px">szavazat leadva</div>
        <div style="background:#e5e7eb;border-radius:99px;height:${mutat?'16':'28'}px;overflow:hidden;max-width:${mutat?'400':'700'}px;margin:0 auto">
          <div id="proj-bar" style="height:100%;background:${szinAlap};border-radius:99px;width:${pct}%;transition:width .5s"></div>
        </div>
        <div id="proj-timer" style="font-size:${mutat?'15':'20'}px;color:#9ca3af;margin-top:${mutat?'10':'20'}px">
          ${lastVote?`Utolsó szavazat: ${timeStr(lastVote)}`:'Még nem érkezett szavazat'}

    if (mutat) {
      // Eredmény + számláló együtt
      R(`<div class="proj" style="height:100vh;display:flex;flex-direction:column;justify-content:center">
        <div style="font-size:32px;font-weight:700;margin-bottom:1.5rem;color:#1a1a1a">${sz.cim}${allapot==='potszavazas'?' — Pótszavazás':''}</div>
        ${szamlaloHtml}
        <div style="display:flex;gap:3rem;align-items:flex-start;margin-top:1.5rem">
          <div style="flex:1">${resultsHtml}</div>
          <div style="flex-shrink:0;text-align:center">
            <div class="proj-qr-big" style="padding:12px"><div id="proj-qr"></div></div>
            <div class="proj-qr-side-label">Szavazói QR</div>
          </div>
        </div>
      </div>`);
    } else {
      // Csak számláló — nagy, látványos, középre igazítva
      R(`<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff">
        <div style="font-size:42px;font-weight:700;color:#1a1a1a;margin-bottom:2.5rem;text-align:center">${sz.cim}${allapot==='potszavazas'?' — Pótszavazás':''}</div>
        ${szamlaloHtml}
        <div style="position:fixed;bottom:2rem;right:2rem;text-align:center">
          <div class="proj-qr-big" style="padding:10px"><div id="proj-qr"></div></div>
          <div style="font-size:12px;color:#9ca3af;margin-top:4px">Szavazói QR</div>
        </div>
      </div>`);
    }
    setTimeout(()=>makeQR('proj-qr',mUrl,mutat?120:100),80);
    return;
  }

  // LEZÁRVA fázis
  if (allapot==='lezarva') {
    const nyertesek = sz.nyertesek||[];
    const res = sz.eredmenyek||{};
    const potRes = sz.potEredmenyek||{};
    const potJeloltek = sz.potJeloltek||[];
    const allRes = {...res};
    Object.entries(potRes).forEach(([k,v])=>{ allRes[k]=(allRes[k]||0)+v; });
    const sorted = Object.entries(allRes).sort((a,b)=>b[1]-a[1]).slice(0,15);
    const max = Math.max(...sorted.map(e=>e[1]),1);
    const ws = new Set(nyertesek);
    const potSet = new Set(potJeloltek);

    // Holtverseny detektálás a lezáráskor
    const tieAtClose = detectTie(sz);
    const potszavazasKell = tieAtClose && !potRes.length;

    R(`<div class="proj"><div style="padding-top:2rem;max-width:900px;margin:0 auto">
      <div style="font-size:28px;font-weight:700;margin-bottom:1.5rem">${sz.cim} — Végeredmény</div>
      ${nyertesek.length?`<div style="font-size:22px;font-weight:600;color:#057a55;margin-bottom:1rem">✓ Bekerült${nyertesek.length>1?'ek':''}: ${nyertesek.join(', ')}</div>`:''}
      ${potJeloltek.length?`<div style="font-size:20px;font-weight:600;color:#d97706;margin-bottom:1.5rem">⚡ Pótszavazás: ${potJeloltek.join(', ')}</div>`:''}
      ${sorted.map(([n,c])=>{
        const w=ws.has(n), p=potSet.has(n)&&!w;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">

            <span style="font-size:18px;font-weight:600;color:${w?'#057a55':p?'#d97706':'#6b7280'}">${c}</span>
          </div>
          <div style="background:#e5e7eb;border-radius:4px;height:20px;overflow:hidden">
            <div style="height:100%;background:${w?'#057a55':p?'#d97706':'#d1d5db'};border-radius:4px;width:${Math.round(c/max*100)}%;transition:width .5s"></div>
          </div>
        </div>`;
      }).join('')}
    </div></div>`);
  }
}

function renderMobil() {
  const szId = P.get('s');
  if (!szId) { R(wrap(`<div class="info">Hiányzó szavazás azonosító. Olvasd be a QR kódot!</div><div style="text-align:center;font-size:11px;color:#d1d5db;margin-top:1rem">${VERSION}</div>`)); return; }
  const sz = DB.szavazasok?.[szId];
  if (!sz) {
    if (Object.keys(DB.szavazasok||{}).length > 0) {
      R(wrap(`<div class="error-box">Ismeretlen szavazás azonosító: <b>${szId}</b><br>Olvasd be újra a QR kódot!</div>`));
    } else {
      R(wrap('<div class="loading"><div class="spinner"></div><span>Betöltés...</span></div>'));
    }
    return;
  }

  const allapot = sz.allapot||'pre';
  const title = sz.cim||'Szavazás';

  // Ha van voterCode sessionben → szinkronizáljuk Firebase-zel (mindig true-ra állítjuk)
  if (voterCode && (allapot==='szavazas'||allapot==='potszavazas'||allapot==='qr')) {
    if (sz.kodok?.[voterCode]) {
      const upd2 = {};
      // Mindig beírjuk - ha már ott van a Firebase felülírja ugyanazzal (nem okoz problémát)
      // Csak akkor írunk ha szükséges
      if (!sz.belepo?.[voterCode]) upd2[`szavazasok/${szId}/belepo/${voterCode}`] = {ts:Date.now()};
      if (!sz.kodok[voterCode].hasznalt) upd2[`szavazasok/${szId}/kodok/${voterCode}/hasznalt`] = true;
      if (Object.keys(upd2).length) update(ref(db), upd2);
      // Nem returnolounk - hagyjuk hogy a render is lefusson
    } else {
      // A kód nem létezik - töröljük a sessiont
      ssRemove('voterCode_' + szId);
      voterCode = null;
    }
  }

  // INAKTÍV vagy PRE fázis
  if (allapot==='inaktiv') {
    R(wrap(`<h1>${title}</h1><div class="info" style="text-align:center;padding:2rem">A szavazás még nem aktív.<br>Várd meg a szervező jelzését.</div>`));
    return;
  }
  if (allapot==='pre') {
    R(wrap(`<h1>${title}</h1><div class="info" style="text-align:center;padding:2rem">A szavazás előkészítés alatt.<br>Várd meg a QR kód megjelenését.</div>`));
    return;
  }

  // QR fázis — kód bekérés / belépés
  if (allapot==='qr') {
    // Ha van voterCode session de a kód nincs a belepo-ban → újra bejegyezzük
    if (voterCode && !sz.belepo?.[voterCode] && sz.kodok?.[voterCode]?.hasznalt) {
      update(ref(db,`szavazasok/${szId}/belepo/${voterCode}`),{ts:Date.now()});
    }
    if (!voterCode) {
      // Belépett-e már ezzel a kóddal?
      R(wrap(`
        <h1>${title}</h1>
        <div class="sub">Add meg az egyedi kódodat</div>
        <input type="text" id="m-kod" placeholder="pl. ABC123" style="text-transform:uppercase;letter-spacing:.1em;font-size:20px;text-align:center" maxlength="6" value="${voterCodeInput}" oninput="this.value=this.value.toUpperCase()">
        <div id="m-err" class="error-box" style="display:none"></div>
        <button class="btn btn-primary" onclick="belepKoddal('${szId}')">Belépés</button>
      `));
      return;
    }
    // Sikeresen belépett
    const belep = Object.keys(sz.belepo||{}).length;
    R(wrap(`
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h1>Sikeresen bejelentkezve!</h1>
        <p style="color:#6b7280;margin-top:8px">Kérjük várd meg a szavazás kezdetét.</p>
        <div style="margin-top:8px;background:#f9fafb;border-radius:8px;padding:8px 14px;font-family:monospace;font-weight:700;font-size:18px;letter-spacing:.1em">${voterCode}</div>
      </div>
      <button class="btn btn-outline" style="margin-top:1rem;color:#c81e1e;border-color:#c81e1e" onclick="kilepSzavazo('${szId}')">Kilépés</button>
    `));
    return;
  }

  // SZAVAZÁS fázis
  if (allapot==='szavazas'||allapot==='potszavazas') {
    // Ellenőrizzük szavazott-e már
    // Pótszavazásnál külön napló - az alap napló NEM blokkolja
    const naploKey = allapot==='potszavazas' ? 'potNaplo' : 'naplo';
    const alreadyVoted = sz[naploKey]?.[voterCode];
    if (alreadyVoted) {
      R(wrap(`<div class="success-screen"><div class="success-icon">✅</div><h1>Már szavaztál!</h1><p style="color:#6b7280;margin-top:8px">${allapot==='potszavazas'?'Pótszavazatod':'Szavazatod'} rögzítve.</p><div style="margin-top:8px;font-family:monospace;font-weight:700;font-size:16px">${voterCode}</div></div>`));
      return;
    }
    if (!voterCode) {
      // Nincs session - normális belépési képernyő (késve érkezők + session elvesztés)
      R(wrap(`
        <h1>${title}</h1>
        <div class="info" style="margin-bottom:1rem">Add meg az egyedi kódodat a szavazáshoz.</div>
        <input type="text" id="m-kod" placeholder="pl. ABC123" style="text-transform:uppercase;letter-spacing:.1em;font-size:20px;text-align:center" maxlength="6" oninput="this.value=this.value.toUpperCase()">
        <div id="m-err" class="error-box" style="display:none"></div>
        <button class="btn btn-primary" onclick="belepKoddal('${szId}')">Belépés</button>
      `));
      return;
    }

    const jeloltek = allapot==='potszavazas' ? (sz.potJeloltek||[]) : (sz.jeloltek||[]);
    const maxV = allapot==='potszavazas' ? (sz.potSpotsNeeded||1) : (sz.maxValaszt||1);
    const checked = Object.keys(localVotes).filter(k=>localVotes[k]);

    // Jelöltek listáját globálisan tároljuk, hogy index alapján érjük el
    window._currentJeloltek = jeloltek;

    R(wrap(`
      <h1>${title}${allapot==='potszavazas'?' — Pótszavazás':''}</h1>
      ${allapot==='potszavazas'?`<div class="warn"><p>Holtverseny miatt pótszavazás. Válassz <b>${maxV}</b> jelöltet!</p></div>`:''}
      <div class="counter">Kiválasztva: <span>${checked.length}</span> / ${maxV}</div>
      <div class="cand-grid">
        ${jeloltek.map((c,i)=>{
          const ch=!!localVotes[c], dis=!ch&&checked.length>=maxV;
          return `<label class="cand-item${ch?' checked':''}${dis?' disabled':''}">
            <input type="checkbox" ${ch?'checked':''} ${dis?'disabled':''} onchange="toggleVoteIdx(${i},this.checked)">${c}
          </label>`;
        }).join('')}
      </div>
      <button class="btn btn-primary" onclick="submitVote('${szId}')">Szavazat leadása</button>
      <button class="btn btn-outline" style="margin-top:4px;color:#c81e1e;border-color:#c81e1e" onclick="kilepSzavazo('${szId}')">Kilépés</button>
    `));
    return;
  }

  // LEZÁRVA
  R(wrap(`<div class="success-screen"><div class="success-icon">🏁</div><h1>A szavazás lezárult</h1><p style="color:#6b7280;margin-top:8px">Köszönjük a részvételt!</p></div>
    <div style="text-align:center;font-size:11px;color:#d1d5db;margin-top:1rem">${VERSION}</div>`));
}

window.belepKoddal = async szId => {
  const kod = document.getElementById('m-kod').value.trim().toUpperCase();
  const err = document.getElementById('m-err');
  err.style.display='none';
  if (!kod||kod.length<4) { err.style.display='block'; err.textContent='Add meg az egyedi kódodat!'; return; }
  const sz = DB.szavazasok?.[szId];
  if (!sz?.kodok?.[kod]) { err.style.display='block'; err.textContent='Érvénytelen kód!'; return; }

  const allapot = sz.allapot||'inaktiv';
  const marHasznalt = sz.kodok[kod].hasznalt;
  const benvan = !!sz.belepo?.[kod];
  const sajatSession = sessionStorage.getItem('voterCode_' + szId) === kod;

  // Ha a kód már be van jelentkezve ÉS nem ez a saját sessionje → elutasítás
  if (benvan && !sajatSession) {
    err.style.display='block'; err.textContent='Ezzel a kóddal már bejelentkezett. Lehet hogy egy másik eszközön vagy böngészőablakban már be van jelentkezve.'; return;
  }
  // Ha hasznalt=true ÉS nincs a belepo-ban ÉS nem saját session → elutasítás
  if (marHasznalt && !benvan && !sajatSession) {
    err.style.display='block'; err.textContent='Ezzel a kóddal már bejelentkezett. Lehet hogy egy másik eszközön vagy böngészőablakban már be van jelentkezve.'; return;
  }

  // Belépés
  voterCode = kod;
  ssSet('voterCode_' + szId, kod);

  // Firebase frissítés
  const upd = {};
  upd[`szavazasok/${szId}/kodok/${kod}/hasznalt`] = true;
  upd[`szavazasok/${szId}/belepo/${kod}`] = {ts:Date.now()};
  await update(ref(db), upd);

  renderMobil();
};

window.kilepSzavazo = async szId => {
  if (!confirm('Kilépsz? Újra be kell majd jelentkezned.')) return;
  const kodToDelete = voterCode;
  // Lokális állapot törlése
  ssRemove('voterCode_' + szId);
  voterCode = null;
  localVotes = {};
  if (kodToDelete) {
    const upd = {};
    upd[`szavazasok/${szId}/belepo/${kodToDelete}`] = null;
    upd[`szavazasok/${szId}/kodok/${kodToDelete}/hasznalt`] = false;
    await update(ref(db), upd);
    // Lokális DB cache frissítés
    if (DB.szavazasok?.[szId]?.belepo) {
      delete DB.szavazasok[szId].belepo[kodToDelete];
    }
    if (DB.szavazasok?.[szId]?.kodok?.[kodToDelete]) {
      DB.szavazasok[szId].kodok[kodToDelete].hasznalt = false;
    }
  }
  renderMobil();
};

window.toggleVote = (n,ch) => { localVotes[n]=ch; renderMobil(); };
window.toggleVoteIdx = (i,ch) => {
  const n = window._currentJeloltek?.[i];
  if(n !== undefined) { localVotes[n]=ch; renderMobil(); }
};

window.submitVote = async szId => {
  const sz = DB.szavazasok?.[szId];
  const allapot = sz?.allapot;
  const maxV = allapot==='potszavazas'?(sz.potSpotsNeeded||1):(sz?.maxValaszt||1);
  const picked = Object.keys(localVotes).filter(k=>localVotes[k]);
  if (!picked.length) { alert('Válassz legalább egy jelöltet!'); return; }
  if (picked.length>maxV) { alert(`Legfeljebb ${maxV} jelöltet választhatsz!`); return; }
  if (!voterCode) { alert('Nincs érvényes bejelentkezés!'); return; }

  const upd = {};
  const resKey = allapot==='potszavazas'?'potEredmenyek':'eredmenyek';
  const naploKey2 = allapot==='potszavazas'?'potNaplo':'naplo';
  picked.forEach(c => {
    const k = c.replace(/\./g,'_');
    upd[`szavazasok/${szId}/${resKey}/${k}`] = (sz[resKey]?.[k]||0)+1;
  });
  upd[`szavazasok/${szId}/voterCount`] = (sz.voterCount||0)+1;
  upd[`szavazasok/${szId}/lastVoteTs`] = Date.now();
  upd[`szavazasok/${szId}/${naploKey2}/${voterCode}`] = {ts:Date.now(), votes:picked};
  console.log('submitVote:', naploKey2, voterCode, JSON.stringify(upd).substring(0,200));
  // Lokális cache frissítés
  if (!DB.szavazasok[szId][naploKey2]) DB.szavazasok[szId][naploKey2] = {};
  DB.szavazasok[szId][naploKey2][voterCode] = {ts:Date.now(), votes:picked};
  console.log('Cache után naplo:', JSON.stringify(DB.szavazasok[szId][naploKey2]));
  await update(ref(db), upd);
  console.log('Firebase write kész');
  localVotes = {};
  renderMobil();
  console.log('renderMobil lefutott, alreadyVoted:', DB.szavazasok[szId][naploKey2]?.[voterCode] ? 'IGEN' : 'NEM');
};

// ── QR kód generálás ──
function makeQR(id, url, size) {
  const el = document.getElementById(id); if(!el) return;
  el.innerHTML='';
  new QRCode(el,{text:url,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});
}

// ── Kivetítő időfrissítő ──
if (isKivetito) {
  setInterval(()=>{
    const t1 = document.getElementById('proj-timer');
    if (!t1) return;
    const sz = getAktivSzavazas();
    if (!sz) return;
    const allapot = sz.allapot||'pre';
    if (allapot==='qr') {
      const entries = Object.values(sz.belepo||{});
      const lastTs = entries.length ? Math.max(...entries.map(e=>e.ts||0)) : null;
      t1.textContent = lastTs ? timeStr(lastTs) : '–';
      const cnt = document.getElementById('proj-belep');
      if (cnt) cnt.textContent = entries.length;
    } else if (allapot==='szavazas'||allapot==='potszavazas') {
      t1.textContent = sz.lastVoteTs ? `Utolsó szavazat: ${timeStr(sz.lastVoteTs)}` : 'Még nem érkezett szavazat';
      const belep2 = Object.keys(sz.belepo||{}).length;
      const szavazott2 = sz.voterCount||0;
      const pct2 = belep2>0 ? Math.round(szavazott2/belep2*100) : 0;
      const kész2 = szavazott2>=belep2 && belep2>0;
      const bar = document.getElementById('proj-bar');
      const szav = document.getElementById('proj-szavazott');
      if (bar) { bar.style.width=pct2+'%'; bar.style.background=kész2?'#057a55':'#1a56db'; }
      if (szav) szav.textContent = szavazott2;
    }
  }, 1000);
}
</script>
